<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>リースドリル</title>
<style>
:root{
  --color-bg:#F7F6F3;
  --color-card:#FFFFFF;
  --color-border:#E5E3DC;
  --color-border2:#D8D5CC;
  --color-text:#1A1A18;
  --color-text2:#6B6B64;
  --color-info:#185FA5;
  --color-bg-secondary:#F0EFEA;
  --radius-lg:16px;
  --radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:520px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center;color:var(--color-text)}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.g-row{display:flex;gap:8px;margin-bottom:6px;align-items:baseline}
.g-key{font-size:13px;color:var(--color-text2);min-width:180px}
.g-val{font-size:15px;font-weight:600;color:var(--color-text)}
.g-head{font-size:13px;font-weight:600;color:var(--color-info);margin:8px 0 4px}
.rate-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.rate-tbl th,.rate-tbl td{border:1px solid #ccc;padding:5px 6px;text-align:center}
.rate-tbl th{background:#F4F3EF;font-weight:600;font-size:12px;color:var(--color-text2)}
.rate-tbl .rv{font-weight:600;font-variant-numeric:tabular-nums}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
/* カテゴリバッジ・トグル */
.cat-badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;margin-bottom:8px;margin-right:6px;font-weight:600;background:#E1EEF8;color:#185FA5}
.cat-badge.b2{background:#FAEEDA;color:#854F0B}
.cat-badge.b3{background:#E8E1F0;color:#5A3D8A}
.toggle-chips{display:flex;gap:6px;flex-wrap:wrap}
.toggle-chip{width:auto;margin:0;padding:7px 14px;border:1px solid var(--color-border2);border-radius:999px;background:var(--color-bg-secondary);font-size:13px;color:var(--color-text2);font-weight:500;cursor:pointer}
.toggle-chip.on{background:var(--color-text);color:#fff;border-color:var(--color-text)}
/* 解答欄 */
.ans-grid{display:grid;grid-template-columns:150px 1fr;gap:10px 12px;align-items:center}
.ans-grid .ans-label{font-size:14px;color:var(--color-text);font-weight:500}
.ans-grid .ans-head{grid-column:1/-1;font-size:13px;font-weight:600;color:var(--color-info);margin-top:4px}
.ans-grid .ans-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ans-grid input{flex:1;min-width:0;width:100%;font-size:15px;padding:7px 10px;border:1px solid var(--color-border2);border-radius:6px;text-align:right;background:var(--color-card)}
.ans-grid input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
.ans-grid input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
.choice-chip{width:auto;margin:0;padding:8px 12px;border:1.5px solid var(--color-border2);border-radius:10px;background:var(--color-card);font-size:13px;color:var(--color-text);font-weight:600;cursor:pointer}
.choice-chip.sel{border-color:var(--color-info);background:#EAF3FB;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
.choice-chip.ok{border-color:#7FB04A;background:#F2F8EA}
.choice-chip.ng{border-color:#D98A8A;background:#FCF0F0}
.ans-ng-msg{font-size:11px;color:#A32D2D;font-weight:600;display:none}
.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
.calc-display{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:8px 12px;font-size:22px;font-weight:500;text-align:right;margin-bottom:8px;min-height:46px;overflow:hidden;white-space:nowrap;letter-spacing:0.02em}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn-push{background:#185FA5;color:#fff;font-size:13px;grid-column:span 4}
.calc-btn{width:auto;margin:0;font-size:18px;padding:13px 4px;border-radius:var(--radius-md);border:none;cursor:pointer;font-weight:400;line-height:1}
.calc-btn:active{opacity:0.75}
.calc-btn-num{background:var(--color-card);border:0.5px solid var(--color-border);color:var(--color-text)}
.calc-btn-op{background:#185FA5;color:#fff}
.calc-btn-fn{background:#D0CEC5;color:var(--color-text)}
.calc-btn-eq{background:var(--color-text);color:#fff}
.calc-btn-wide{grid-column:span 2}
</style>

    <div id="calc-disp" class="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-push" onclick="calcToAns()">↑ 回答欄へ反映（次の空欄へ）</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('C')">C</button>

<script>
let STATE={total:0,perfect:0,q:null,graded:false,startTime:0,choices:{}};
function fmtElapsed(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return m>0?`${m}分${r}秒`:`${r}秒`;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function fmt(n){const neg=n<0;const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'−':'')+s;}
function parseNum(v){
  if(v==null)return 0;
  let s=String(v).trim().replace(/[,，]/g,'').replace(/[ \t]/g,'')
    .replace(/[＋]/g,'+').replace(/[－−]/g,'-')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  if(s===''||s==='-')return 0;
  if(s.includes('+')||s.replace(/^-/,'').includes('-')){
    const tokens=s.match(/[+-]?\d+/g)||[];
    return tokens.reduce((a,t)=>a+parseInt(t,10),0);
  }
  const n=parseInt(s,10);return isNaN(n)?0:n;
}

// ============ カテゴリ定義 ============
const CATS=[
  {key:'judge',label:'判定'},
  {key:'cap',label:'計上額'},
  {key:'bal',label:'残高計算'},
];
const enabled={judge:true,cap:true,bal:true};

function renderToggles(){
  document.getElementById('cat-toggles').innerHTML=CATS.map(c=>
    `<button type="button" class="toggle-chip ${enabled[c.key]?'on':''}" id="tg-${c.key}" onclick="toggleCat('${c.key}')">${c.label}</button>`
  ).join('');
}
function toggleCat(key){
  const onCount=Object.values(enabled).filter(Boolean).length;
  if(enabled[key]&&onCount===1)return;  // 最低1つは残す
  enabled[key]=!enabled[key];
  renderToggles();
}

// ============ ① 判定ドリル ============
// FL判定：現在価値基準（PV≧見積現金購入価額×90%）or 経済的耐用年数基準（リース期間≧耐用年数×75%）
// 移転判定：所有権移転条項／割安購入選択権／特別仕様 のいずれか → 移転
const CLAUSES=[
  {text:'リース期間終了後に所有権が借手に移転する定めがある',transfer:true},
  {text:'借手に割安購入選択権が付与されている',transfer:true},
  {text:'リース物件は借手の用途に合わせた特別仕様である',transfer:true},
  {text:'所有権の移転に関する特段の定めはない',transfer:false},
];
function genJudge(){
  for(let t=0;t<4000;t++){
    const quadrant=pick(['both','pvOnly','lifeOnly','neither']);
    // 耐用年数とリース期間（75%基準）
    const pairs=[];
    for(let el=4;el<=10;el++)for(let k=2;k<el;k++)pairs.push([el,k]);
    const wantLife=(quadrant==='both'||quadrant==='lifeOnly');
    const cand=pairs.filter(([el,k])=>wantLife?(k*100>=el*75):(k*100<el*75));
    if(!cand.length)continue;
    const [EL,n]=pick(cand);
    // 現在価値基準（90%）
    const P=rand(50,90)*100;
    const wantPV=(quadrant==='both'||quadrant==='pvOnly');
    const pvR=wantPV?rand(90,97):rand(78,89);
    const PV=P*pvR/100;
    if(PV!==Math.floor(PV))continue;
    const isFL=wantPV||wantLife;
    // 契約条項（OLのときは「定めなし」に固定）
    const clause=isFL?pick(CLAUSES):CLAUSES[3];
    const isTransfer=isFL&&clause.transfer;
    const ansIdx=isFL?(isTransfer?0:1):2;

    let g=`<div class="g-row"><span class="g-key">見積現金購入価額</span><span class="g-val">${fmt(P)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース料総額の割引現在価値</span><span class="g-val">${fmt(PV)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース契約期間</span><span class="g-val">${n}年</span></div>`;
    g+=`<div class="g-row"><span class="g-key">経済的耐用年数</span><span class="g-val">${EL}年</span></div>`;
    g+=`<div class="g-head">契約条項</div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・${clause.text}</span></div>`;

    const lifeR=Math.round(n/EL*1000)/10;
    const explain=[
      `<b>① フルペイアウトの判定</b>`,
      `　現在価値基準：${fmt(PV)} ÷ ${fmt(P)} ＝ ${pvR}% ${pvR>=90?'≧':'＜'} 90% → ${pvR>=90?'該当':'非該当'}`,
      `　経済的耐用年数基準：${n}年 ÷ ${EL}年 ＝ ${lifeR}% ${n*100>=EL*75?'≧':'＜'} 75% → ${n*100>=EL*75?'該当':'非該当'}`,
      `　→ ${isFL?'いずれかを満たす → <b>ファイナンス・リース</b>':'いずれも満たさない → <b>オペレーティング・リース</b>（賃貸借処理）'}`,
    ];
    if(isFL){
      explain.push(`<b>② 移転／移転外の判定</b>`);
      explain.push(`　${clause.text} → ${isTransfer?'<b>所有権移転</b>（移転条項・割安購入選択権・特別仕様のいずれかで移転）':'<b>所有権移転外</b>'}`);
    }
    return{
      catKey:'judge',
      badges:['判定'],
      givenHTML:g,
      fields:[{kind:'choice',id:'f-judge',label:'取引の区分',options:['所有権移転FL','所有権移転外FL','オペレーティング'],exp:ansIdx}],
      hint:'FL判定：現在価値基準（90%以上）／経済的耐用年数基準（75%以上）のいずれかで該当。<br>移転判定：所有権移転条項・割安購入選択権・特別仕様のいずれかがあれば所有権移転。',
      explain,
    };
  }
  return null;
}

// ============ ② 計上額の決定 ============
// 貸手の購入価額 明/不明 × 移転/移転外 の4マス
function genCapital(){
  for(let t=0;t<8000;t++){
    const known=Math.random()<0.5;         // 貸手の購入価額が明らかか
    const isTransfer=Math.random()<0.5;
    const n=rand(3,5);
    const ratePct=pick([4,5,6,7,8]);
    const r=ratePct/100;
    const coef=[];
    for(let k=1;k<=n;k++)coef.push(Math.round(100/Math.pow(1+r,k))/100);
    const S=Math.round(coef.reduce((a,c)=>a+c,0)*100)/100;
    const annual=rand(10,30)*100;
    const PV=Math.round(annual*S);
    // 比較対象額（明→貸手購入価額、不明→見積現金購入価額）
    const base=Math.round(PV/100)*100;
    const off=(Math.random()<0.5?-1:1)*rand(1,6)*100;
    const cmp=base+off;
    if(cmp<=0||cmp===PV)continue;
    // 計上額
    let capital;
    if(known&&isTransfer)capital=cmp;                    // 明・移転：貸手の購入価額
    else capital=Math.min(cmp,PV);                       // それ以外：低い方
    // 減価償却
    const EL=n+rand(1,3);
    const residual=isTransfer?capital*0.1:0;
    if(residual!==Math.floor(residual))continue;
    const deprPeriod=isTransfer?EL:n;
    const depreciable=capital-residual;
    if(depreciable%deprPeriod!==0)continue;
    const annualDepr=depreciable/deprPeriod;
    // 利子相当額（定額法）
    const total=annual*n;
    const interestTotal=total-capital;
    if(interestTotal<=0||interestTotal%n!==0)continue;
    const annualInterest=interestTotal/n;
    const principal1=annual-annualInterest;
    const y1liab=capital-principal1;
    if(principal1<=0||y1liab<=0)continue;

    const typeLabel=isTransfer?'所有権移転ファイナンスリース':'所有権移転外ファイナンスリース';
    const rateLabel=known?'貸手の計算利子率（知り得る）':'借手の追加借入利子率';
    let g=`<div class="g-row"><span class="g-key">取引の種類</span><span class="g-val" style="font-size:13px">${typeLabel}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース料（後払い）</span><span class="g-val">年額 ${fmt(annual)}（総額 ${fmt(total)}）</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース契約期間</span><span class="g-val">${n}年</span></div>`;
    if(known){
      g+=`<div class="g-row"><span class="g-key">貸手の購入価額</span><span class="g-val">${fmt(cmp)}</span></div>`;
    }else{
      g+=`<div class="g-row"><span class="g-key">貸手の購入価額・利子率</span><span class="g-val" style="font-size:13px">明らかでない</span></div>`;
      g+=`<div class="g-row"><span class="g-key">借手の見積現金購入価額</span><span class="g-val">${fmt(cmp)}</span></div>`;
    }
    g+=`<div class="g-row"><span class="g-key">${rateLabel}</span><span class="g-val">年 ${ratePct}%</span></div>`;
    g+=`<div class="g-row"><span class="g-key">経済的耐用年数</span><span class="g-val">${EL}年</span></div>`;
    g+=`<div class="g-head">年利率 ${ratePct}% の現価係数</div>`;
    let th='',td='';
    for(let k=1;k<=n;k++){th+=`<th>${k}年</th>`;td+=`<td class="rv">${coef[k-1].toFixed(2)}</td>`;}
    g+=`<table class="rate-tbl"><tr>${th}</tr><tr>${td}</tr></table>`;
    g+=`<div class="g-head">条件</div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・減価償却：定額法（移転→残存10%・耐用年数／移転外→残存0・リース期間）</span></div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・利子相当額の配分：定額法</span></div>`;

    const sumExpr=coef.map(c=>c.toFixed(2)).join('＋');
    const explain=[`<b>① 計上額の決定</b>`];
    if(known&&isTransfer){
      explain.push(`　貸手の購入価額が明らか・所有権移転 → <b>貸手の購入価額 ${fmt(cmp)}</b> をそのまま計上（PVとの比較不要）`);
    }else{
      explain.push(`　現価係数合計 ＝ ${sumExpr} ＝ ${S.toFixed(2)}`);
      explain.push(`　PV ＝ ${fmt(annual)} × ${S.toFixed(2)} ＝ ${fmt(PV)}（割引率：${rateLabel} ${ratePct}%）`);
      const cmpName=known?'貸手の購入価額':'見積現金購入価額';
      explain.push(`　${cmpName} ${fmt(cmp)} と PV ${fmt(PV)} の低い方 → <b>${fmt(capital)}</b>`);
    }
    explain.push(`<b>② 減価償却</b>（${isTransfer?`残存10%・耐用年数${EL}年`:`残存0・リース期間${n}年`}）`);
    explain.push(`　（${fmt(capital)}−${fmt(residual)}）÷ ${deprPeriod}年 ＝ ${fmt(annualDepr)}`);
    explain.push(`<b>③ 利子相当額</b>　総額 ＝ ${fmt(total)} − ${fmt(capital)} ＝ ${fmt(interestTotal)}、年間 ＝ ${fmt(interestTotal)} ÷ ${n} ＝ ${fmt(annualInterest)}`);
    explain.push(`<b>④ 第1期末リース債務</b>　${fmt(capital)} − （${fmt(annual)}−${fmt(annualInterest)}）＝ ${fmt(y1liab)}`);

    return{
      catKey:'cap',
      badges:['計上額の決定',known?'貸手購入価額：明らか':'貸手購入価額：不明',isTransfer?'移転':'移転外'],
      givenHTML:g,
      fields:[
        {kind:'num',id:'f-cap',label:'リース資産計上額',exp:capital},
        {kind:'num',id:'f-depr',label:'年間減価償却費',exp:annualDepr},
        {kind:'num',id:'f-inttot',label:'利子相当額（総額）',exp:interestTotal},
        {kind:'num',id:'f-intyr',label:'年間支払利息',exp:annualInterest},
        {kind:'num',id:'f-liab1',label:'第1期末リース債務',exp:y1liab},
      ],
      hint:'計上額：明・移転→貸手の購入価額そのまま／明・移転外→min(貸手購入価額, PV)／不明→min(見積現金購入価額, PV)。<br>PV＝年額リース料×現価係数合計。',
      explain,
    };
  }
  return null;
}

// ============ ③ 残高計算（2期分の勘定残高） ============
function genBalance(){
  for(let t=0;t<2000;t++){
    const isTransfer=Math.random()<0.5;
    const useInterest=Math.random()<0.5;
    const leaseTerm=rand(3,6);
    const economicLife=isTransfer?rand(leaseTerm,leaseTerm+4):rand(leaseTerm+1,leaseTerm+5);
    const assetVal=rand(3,20)*leaseTerm*100;
    if(assetVal<600||assetVal>9000)continue;
    const residual=isTransfer?assetVal*0.1:0;
    if(residual!==Math.floor(residual))continue;
    const deprPeriod=isTransfer?economicLife:leaseTerm;
    const depreciable=assetVal-residual;
    if(depreciable%deprPeriod!==0)continue;
    const annualDepr=depreciable/deprPeriod;

    let ratePct=0,annualPayment,y1int,y1prin,y1liab,y2int,y2prin,y2liab;
    if(useInterest){
      ratePct=rand(2,8);
      const r=ratePct/100;
      const a=(1-Math.pow(1+r,-leaseTerm))/r;
      annualPayment=Math.round(assetVal/a);
      y1int=Math.round(assetVal*r);
      y1prin=annualPayment-y1int;
      y1liab=assetVal-y1prin;
      y2int=Math.round(y1liab*r);
      y2prin=annualPayment-y2int;
      y2liab=y1liab-y2prin;
    }else{
      const annualPrincipal=assetVal/leaseTerm;
      if(annualPrincipal!==Math.floor(annualPrincipal))continue;
      const annualInterest=rand(1,8)*10;
      annualPayment=annualPrincipal+annualInterest;
      y1int=annualInterest;y1prin=annualPrincipal;y1liab=assetVal-annualPrincipal;
      y2int=annualInterest;y2prin=annualPrincipal;y2liab=assetVal-annualPrincipal*2;
    }
    if(y1prin<=0||y2prin<=0||y2liab<=0)continue;

    const typeLabel=isTransfer?'所有権移転ファイナンスリース':'所有権移転外ファイナンスリース';
    let g=`<div class="g-row"><span class="g-key">取引の種類</span><span class="g-val" style="font-size:13px">${typeLabel}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース開始</span><span class="g-val">期首</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース資産計上額</span><span class="g-val">${fmt(assetVal)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">年間リース料（期末払）</span><span class="g-val">${fmt(annualPayment)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">リース期間</span><span class="g-val">${leaseTerm}年</span></div>`;
    g+=`<div class="g-row"><span class="g-key">経済的耐用年数</span><span class="g-val">${economicLife}年</span></div>`;
    if(useInterest)g+=`<div class="g-row"><span class="g-key">計算利子率（年）</span><span class="g-val">${ratePct}%</span></div>`;
    g+=`<div class="g-head">条件</div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・減価償却方法：定額法</span></div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・利子相当額の配分：${useInterest?'利息法':'定額法'}</span></div>`;
    if(useInterest)g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・支払利息は千円未満を四捨五入</span></div>`;
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・残存価額：取得原価の10%（所有権移転）／ 0円（移転外）</span></div>`;

    const lines=[];
    lines.push(`<b>種類：</b>${isTransfer?'所有権移転':'移転外'} → 残存${isTransfer?'取得原価の10%':'0円'}、償却期間 ${deprPeriod}年（${isTransfer?'経済的耐用年数':'リース期間'}）`);
    lines.push(`<b>年間償却費：</b>（${fmt(assetVal)}−${fmt(residual)}）÷ ${deprPeriod}年 ＝ ${fmt(annualDepr)}`);
    if(useInterest){
      lines.push(`<b>利子配分：利息法（年利${ratePct}%）</b>　支払利息＝期首債務×利率（千円未満四捨五入）`);
      lines.push('<b>第1期末</b>');
      lines.push(`　支払利息：${fmt(assetVal)} × ${ratePct}% ＝ ${fmt(y1int)}`);
      lines.push(`　リース債務：${fmt(assetVal)} − （${fmt(annualPayment)}−${fmt(y1int)}）＝ ${fmt(y1liab)}`);
      lines.push('<b>第2期末</b>');
      lines.push(`　支払利息：${fmt(y1liab)} × ${ratePct}% ＝ ${fmt(y2int)}`);
      lines.push(`　リース債務：${fmt(y1liab)} − （${fmt(annualPayment)}−${fmt(y2int)}）＝ ${fmt(y2liab)}`);
    }else{
      const totalInterest=y1int*leaseTerm;
      lines.push(`<b>利子配分：定額法</b>　利子総額 ＝ ${fmt(annualPayment)}×${leaseTerm} − ${fmt(assetVal)} ＝ ${fmt(totalInterest)}、年間 ${fmt(y1int)}`);
      lines.push(`第1期末 リース債務：${fmt(assetVal)} − ${fmt(y1prin)} ＝ ${fmt(y1liab)}`);
      lines.push(`第2期末 リース債務：${fmt(assetVal)} − ${fmt(y1prin)}×2 ＝ ${fmt(y2liab)}`);
    }

    return{
      catKey:'bal',
      badges:['残高計算',useInterest?'利息法':'定額法'],
      givenHTML:g,
      fields:[
        {kind:'head',label:'第1期末'},
        {kind:'num',id:'f-a1',label:'リース資産',exp:assetVal},
        {kind:'num',id:'f-d1',label:'減価償却累計額',exp:annualDepr},
        {kind:'num',id:'f-l1',label:'リース債務',exp:y1liab},
        {kind:'num',id:'f-i1',label:'支払利息',exp:y1int},
        {kind:'head',label:'第2期末'},
        {kind:'num',id:'f-a2',label:'リース資産',exp:assetVal},
        {kind:'num',id:'f-d2',label:'減価償却累計額',exp:annualDepr*2},
        {kind:'num',id:'f-l2',label:'リース債務',exp:y2liab},
        {kind:'num',id:'f-i2',label:'支払利息',exp:y2int},
      ],
      hint:'移転→残存10%・経済的耐用年数で償却。移転外→残存0・リース期間で償却。<br>利息法は支払利息＝期首債務×利率（千円未満四捨五入）。',
      explain:lines,
    };
  }
  return null;
}

// ============ 共通：出題・描画・採点 ============
const GENS={judge:genJudge,cap:genCapital,bal:genBalance};

function newQ(){
  const pool=CATS.filter(c=>enabled[c.key]);
  const cat=pick(pool);
  const q=GENS[cat.key]();
  if(!q)return;
  STATE.q=q;STATE.graded=false;STATE.startTime=Date.now();STATE.choices={};
  const cls={judge:'b2',cap:'b3',bal:''}[q.catKey];
  document.getElementById('badge-area').innerHTML=
    q.badges.map((b,i)=>`<span class="cat-badge ${i===0?cls:''}">${b}</span>`).join('');
  document.getElementById('given-area').innerHTML=q.givenHTML;
  let h='<div class="ans-grid">';
  for(const f of q.fields){
    if(f.kind==='head'){
      h+=`<div class="ans-head">${f.label}</div>`;
    }else if(f.kind==='num'){
      h+=`<span class="ans-label">${f.label}</span><div class="ans-cell"><input type="text" id="${f.id}" autocomplete="off"><span class="ans-ng-msg" id="ng-${f.id}"></span></div>`;
    }else{
      h+=`<span class="ans-label">${f.label}</span><div class="ans-cell">`+
        f.options.map((o,i)=>`<button type="button" class="choice-chip" id="${f.id}-opt${i}" onclick="pickChoice('${f.id}',${i})">${o}</button>`).join('')+
        `<span class="ans-ng-msg" id="ng-${f.id}"></span></div>`;
    }
  }
  h+='</div>';
  document.getElementById('answer-area').innerHTML=h;
  document.getElementById('hint-area').innerHTML=q.hint||'';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

function pickChoice(id,idx){
  if(STATE.graded)return;
  STATE.choices[id]=idx;
  const f=STATE.q.fields.find(x=>x.id===id);
  f.options.forEach((_,i)=>{
    document.getElementById(`${id}-opt${i}`).classList.toggle('sel',i===idx);
  });
}

function grade(){
  if(!STATE.q||STATE.graded)return;
  const q=STATE.q;
  let ok=0,cnt=0;
  for(const f of q.fields){
    if(f.kind==='head')continue;
    cnt++;
    const ng=document.getElementById('ng-'+f.id);
    if(f.kind==='num'){
      const el=document.getElementById(f.id);
      const correct=parseNum(el.value)===f.exp;
      if(correct)ok++;
      el.classList.remove('cell-ok','cell-ng');el.classList.add(correct?'cell-ok':'cell-ng');
      if(!correct){ng.textContent='正:'+fmt(f.exp);ng.style.display='inline';}
      else ng.style.display='none';
    }else{
      const sel=STATE.choices[f.id];
      const correct=sel===f.exp;
      if(correct)ok++;
      f.options.forEach((_,i)=>{
        const c=document.getElementById(`${f.id}-opt${i}`);
        c.classList.remove('sel','ok','ng');
        if(i===sel)c.classList.add(correct?'ok':'ng');
        if(!correct&&i===f.exp)c.classList.add('ok');
      });
      if(!correct){ng.textContent='正:'+f.options[f.exp];ng.style.display='inline';}
      else ng.style.display='none';
    }
  }
  STATE.graded=true;STATE.total++;
  const allOk=ok===cnt;
  if(allOk)STATE.perfect++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-perfect').textContent=STATE.perfect;
  const elapsed=fmtElapsed(Date.now()-STATE.startTime);
  const recon=`<div class="hint" style="margin-top:6px">${['所要時間：'+elapsed].concat(q.explain).join('<br>')}</div>`;
  document.getElementById('result-area').innerHTML=
    `<div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 全問正解！':'正解 '+ok+' / '+cnt+' 個（赤に正答を表示）'}</div>`+recon;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}
renderToggles();
newQ();

// 電卓 → 解答欄へ順送りで反映（数字が入っている最後の欄の次の空欄へ）
function calcToAns(){
  if(!STATE.q||STATE.graded)return;
  const n=parseFloat(cs.disp);
  if(isNaN(n))return;
  const nums=STATE.q.fields.filter(f=>f.kind==='num');
  if(!nums.length)return;
  let lastFilled=-1;
  nums.forEach((f,i)=>{
    const el=document.getElementById(f.id);
    if(el&&el.value.trim()!=='')lastFilled=i;
  });
  let idx=lastFilled+1;
  if(idx>=nums.length){
    idx=nums.findIndex(f=>{const el=document.getElementById(f.id);return el&&el.value.trim()==='';});
    if(idx<0)return;   // 全欄埋まっている
  }
  const el=document.getElementById(nums[idx].id);
  if(el)el.value=String(Math.round(n));
}

const cs={disp:'0',prev:null,op:null,fresh:true};
function calcIn(v){
  const s=cs;
  if(v==='C'){s.disp='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(v==='←'){s.disp=s.disp.length>1?s.disp.slice(0,-1):'0';if(s.disp==='-')s.disp='0';}
  else if(v==='.'){if(s.fresh){s.disp='0.';s.fresh=false;}else if(!s.disp.includes('.'))s.disp+='.';}
  else if('0123456789'.includes(v)){
    if(s.fresh){s.disp=v==='0'?'0':v;s.fresh=false;}
    else s.disp=s.disp==='0'?v:s.disp+v;
  }else if(v==='±'){
    if(s.disp!=='0')s.disp=s.disp.startsWith('-')?s.disp.slice(1):'-'+s.disp;
  }else if(['+','-','×','÷'].includes(v)){
    if(!s.fresh&&s.op!==null){s.prev=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(s.prev);}
    else{s.prev=parseFloat(s.disp);}
    s.op=v;s.fresh=true;
  }else if(v==='='){
    if(s.op!==null){const r=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(r);s.prev=null;s.op=null;s.fresh=true;}
  }
  document.getElementById('calc-disp').textContent=fmtCalc(s.disp);
}
function calcDo(a,b,op){if(op==='+')return a+b;if(op==='-')return a-b;if(op==='×')return a*b;if(op==='÷')return b?a/b:0;return b;}
function numStr(n){return String(Math.round(n*1e9)/1e9);}
function fmtCalc(s){const[i,d]=s.split('.');const f=i.replace(/\B(?=(\d{3})+(?!\d))/g,',');return d!==undefined?f+'.'+d:f;}
