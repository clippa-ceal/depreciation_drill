<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>仕入ドリル</title>
<style>
:root{
  --color-bg:#F7F6F3;
  --color-card:#FFFFFF;
  --color-border:#E5E3DC;
  --color-border2:#D8D5CC;
  --color-text:#1A1A18;
  --color-text2:#6B6B64;
  --color-info:#185FA5;
  --color-bg-secondary:#F0EFEA;
  --radius-lg:16px;
  --radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:520px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center;color:var(--color-text)}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.g-row{display:flex;gap:8px;margin-bottom:6px;align-items:baseline}
.g-key{font-size:13px;color:var(--color-text2);min-width:170px}
.g-val{font-size:15px;font-weight:600;color:var(--color-text)}
.g-sub{padding-left:14px}
.g-head{font-size:13px;font-weight:600;color:var(--color-info);margin:8px 0 4px}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
.ans-grid{display:grid;grid-template-columns:minmax(106px,132px) minmax(0,1fr);gap:10px 12px;align-items:center}
.ans-grid .ans-label{font-size:14px;color:var(--color-text);font-weight:500;line-height:1.35}
.ans-grid .ans-cell{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(72px,.62fr);gap:6px;align-items:center;min-width:0}
.ans-grid input{min-width:0;width:100%;font-size:15px;padding:7px 10px;border:1px solid var(--color-border2);border-radius:6px;text-align:right;background:var(--color-card)}
.ans-grid input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
.ans-grid input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
.ans-grid input.expr-result{background:var(--color-bg-secondary);color:var(--color-text2);font-weight:600;cursor:default}
.ans-grid input.expr-result.expr-invalid{border-color:#D98A8A;color:#A32D2D}
.expr-eq{font-size:14px;color:var(--color-text2);font-weight:600}
.ans-ng-msg{grid-column:1 / -1;font-size:11px;color:#A32D2D;font-weight:600;display:none}
@media (max-width:360px){
  .ans-grid{grid-template-columns:104px minmax(0,1fr);gap:9px 9px}
  .ans-grid .ans-cell{grid-template-columns:minmax(0,1fr) auto 68px;gap:4px}
  .ans-grid input{font-size:14px;padding:7px 6px}
}
.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
.calc-display{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:8px 12px;font-size:22px;font-weight:500;text-align:right;margin-bottom:8px;min-height:46px;overflow:hidden;white-space:nowrap;letter-spacing:0.02em}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn{width:auto;margin:0;font-size:18px;padding:13px 4px;border-radius:var(--radius-md);border:none;cursor:pointer;font-weight:400;line-height:1}
.calc-btn:active{opacity:0.75}
.calc-btn-num{background:var(--color-card);border:0.5px solid var(--color-border);color:var(--color-text)}
.calc-btn-op{background:#185FA5;color:#fff}
.calc-btn-fn{background:#D0CEC5;color:var(--color-text)}
.calc-btn-eq{background:var(--color-text);color:#fff}
.calc-btn-wide{grid-column:span 2}
.box-t{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0 4px}
.box-t th,.box-t td{border:1px solid #ccc;padding:3px 7px}
.box-t .bt-name{text-align:center;font-weight:600;background:#E8E6DE;font-size:13px;letter-spacing:3px;padding:5px}
.box-t .bt-side{text-align:center;font-size:11px;color:var(--color-text2);font-weight:600;background:#F4F3EF}
.box-t .bt-lbl{font-size:12px}
.box-t .bt-val{text-align:right;white-space:nowrap;min-width:52px;font-size:12px}
.box-t tr.bt-bold td{font-weight:700}
.box-t tr.bt-total td{border-top:2px solid #888;font-weight:600;text-align:right;font-size:12px}
</style>
</head>
<body>
<div id="app">
  <h1>仕入ドリル</h1>
  <div class="nav"><a href="index.html">減価償却</a><a href="pension.html">退職給付</a><a href="purchases.html" class="nav-on">仕入</a></div>
  <div class="stat-grid">
    <div class="stat"><span class="n" id="s-total">0</span><span class="l">問</span></div>
    <div class="stat"><span class="n" id="s-perfect">0</span><span class="l">全問正解</span></div>
  </div>

  <div class="card">
    <div class="label">与件（単位：千円）</div>
    <div id="given-area"></div>
  </div>

  <div class="card">
    <div class="label">棚卸高の修正（単位：千円）</div>
    <div class="ans-grid">
      <span class="ans-label">修正後帳簿棚卸高</span>
      <div class="ans-cell">
        <input type="text" id="a-cbook" autocomplete="off" spellcheck="false" placeholder="例: 605-20+30" aria-label="修正後帳簿棚卸高の計算式">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-cbook" class="expr-result" readonly tabindex="-1" aria-label="修正後帳簿棚卸高の計算結果">
        <span class="ans-ng-msg" id="ng-cbook"></span>
      </div>
      <span class="ans-label">修正後実地棚卸高</span>
      <div class="ans-cell">
        <input type="text" id="a-cphysical" autocomplete="off" spellcheck="false" placeholder="例: 580+30" aria-label="修正後実地棚卸高の計算式">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-cphysical" class="expr-result" readonly tabindex="-1" aria-label="修正後実地棚卸高の計算結果">
        <span class="ans-ng-msg" id="ng-cphysical"></span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label">決算整理後の各勘定残高（単位：千円）</div>
    <div class="ans-grid">
      <span class="ans-label">繰越商品</span>
      <div class="ans-cell">
        <input type="text" id="a-inv" autocomplete="off" spellcheck="false" aria-label="繰越商品">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-inv" class="expr-result" readonly tabindex="-1" aria-label="繰越商品の計算結果">
        <span class="ans-ng-msg" id="ng-inv"></span>
      </div>
      <span class="ans-label">仕入</span>
      <div class="ans-cell">
        <input type="text" id="a-cogs" autocomplete="off" spellcheck="false" aria-label="仕入">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-cogs" class="expr-result" readonly tabindex="-1" aria-label="仕入の計算結果">
        <span class="ans-ng-msg" id="ng-cogs"></span>
      </div>
      <span class="ans-label">棚卸減耗損</span>
      <div class="ans-cell">
        <input type="text" id="a-wear" autocomplete="off" spellcheck="false" aria-label="棚卸減耗損">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-wear" class="expr-result" readonly tabindex="-1" aria-label="棚卸減耗損の計算結果">
        <span class="ans-ng-msg" id="ng-wear"></span>
      </div>
      <span class="ans-label">見本品費</span>
      <div class="ans-cell">
        <input type="text" id="a-sample" autocomplete="off" spellcheck="false" aria-label="見本品費">
        <span class="expr-eq">＝</span>
        <input type="text" id="r-sample" class="expr-result" readonly tabindex="-1" aria-label="見本品費の計算結果">
        <span class="ans-ng-msg" id="ng-sample"></span>
      </div>
    </div>
    <div class="hint" id="ans-hint">三分法。棚卸減耗損は別科目、商品評価損は仕入に含める。<br>仕入の期末商品は「修正後帳簿棚卸高」を使い、繰越商品はそこから減耗損・評価損を控除する。<br>未処理事項は、帳簿棚卸高・実地棚卸高のどちらを修正するかを先に判定。売上返品が実地に含まれるときは帳簿のみ、未着で当社所有のときは両方に反映。</div>
  </div>

  <div id="result-area"></div>
  <button id="btn-check" onclick="grade()">答え合わせ</button>
  <button id="btn-next" style="display:none" onclick="nextQ()">次の問題 →</button>

  <div class="card" style="margin-top:0.25rem">
    <div class="label" style="margin-bottom:6px">電卓</div>
    <div id="calc-disp" class="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-fn" onclick="calcIn('C')">C</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('←')">←</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('%')">%</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('÷')">÷</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('7')">7</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('8')">8</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('9')">9</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('×')">×</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('4')">4</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('5')">5</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('6')">6</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('-')">−</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('1')">1</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('2')">2</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('3')">3</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('+')">+</button>
      <button class="calc-btn calc-btn-num calc-btn-wide" onclick="calcIn('0')">0</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('.')">.</button>
      <button class="calc-btn calc-btn-eq" onclick="calcIn('=')">=</button>
    </div>
  </div>
</div>

<script>
let STATE={total:0,perfect:0,g:null,graded:false,startTime:0};
function fmtElapsed(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return m>0?`${m}分${r}秒`:`${r}秒`;}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function fmt(n){const neg=n<0;const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'−':'')+s;}
function normalizeExpression(v){
  return String(v??'').trim()
    .replace(/[,，]/g,'')
    .replace(/[ \t]/g,'')
    .replace(/[＋]/g,'+')
    .replace(/[－−]/g,'-')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
}
function evaluateExpression(v){
  const s=normalizeExpression(v);
  if(s==='')return{empty:true,valid:true,value:null};
  if(!/^[+-]?\d+(?:[+-]\d+)*$/.test(s))return{empty:false,valid:false,value:null};
  const terms=s.match(/[+-]?\d+/g)||[];
  return{empty:false,valid:true,value:terms.reduce((sum,t)=>sum+parseInt(t,10),0)};
}
function parseNum(v){
  const r=evaluateExpression(v);
  return r.valid&&!r.empty?r.value:NaN;
}
function updateExpressionPreview(inputId,resultId){
  const input=document.getElementById(inputId);
  const result=document.getElementById(resultId);
  if(!input||!result)return;
  const r=evaluateExpression(input.value);
  result.classList.toggle('expr-invalid',!r.valid);
  if(r.empty){result.value='';result.title='';}
  else if(r.valid){result.value=fmt(r.value);result.title='';}
  else{result.value='入力途中';result.title='数字と＋・−で入力してください';}
}
function bindExpressionInputs(){
  const pairs=[
    ['a-cbook','r-cbook'],['a-cphysical','r-cphysical'],
    ['a-inv','r-inv'],['a-cogs','r-cogs'],['a-wear','r-wear'],['a-sample','r-sample']
  ];
  for(const[inputId,resultId]of pairs){
    const input=document.getElementById(inputId);
    input.addEventListener('input',()=>updateExpressionPreview(inputId,resultId));
  }
}
function resetExpressionPreviews(){
  for(const[inputId,resultId] of [
    ['a-cbook','r-cbook'],['a-cphysical','r-cphysical'],
    ['a-inv','r-inv'],['a-cogs','r-cogs'],['a-wear','r-wear'],['a-sample','r-sample']
  ])updateExpressionPreview(inputId,resultId);
}

function genQ(){
  for(let t=0;t<300;t++){
    const openingInv=rand(20,80)*10;
    const purchases=rand(80,300)*10;
    const physical=rand(30,100)*10;
    const wear=rand(2,10)*5;
    const valuationLoss=rand(1,3)*10;
    const sampleAmt=Math.random()<0.8?rand(1,5)*10:0;
    const returnAmt=Math.random()<0.5?rand(1,5)*10:0; // 仕入返品（未処理）：50%

    // 売上返品タイプ：40%=実地に含む、40%=未着（当社所有）、20%=なし
    const srRnd=Math.random();
    let salesReturnType=0,salesReturnCost=0;
    if(srRnd<0.40){salesReturnType=1;salesReturnCost=rand(1,5)*10;}
    else if(srRnd<0.80){salesReturnType=2;salesReturnCost=rand(1,5)*10;}
    const srInPhysical=salesReturnType===1?salesReturnCost:0;
    const srNotInPhysical=salesReturnType===2?salesReturnCost:0;

    // 調整項目がすべて異なる金額になるよう確認（混同防止）
    const adjVals=[wear,valuationLoss];
    if(sampleAmt>0)adjVals.push(sampleAmt);
    if(returnAmt>0)adjVals.push(returnAmt);
    if(salesReturnCost>0)adjVals.push(salesReturnCost);
    if(new Set(adjVals).size<adjVals.length)continue;
    if(valuationLoss>=physical+srNotInPhysical)continue;

    // すべての未処理事項を反映した、棚卸減耗損の比較に用いる棚卸高。
    // 売上返品は帳簿棚卸高には未反映。未着品は実地棚卸高にも加算する。
    const correctedBook=physical+wear+srNotInPhysical;
    const correctedPhysical=physical+srNotInPhysical;

    // 与件として示す帳簿棚卸高は「未処理事項反映前」。
    // 見本品・仕入返品は帳簿に残っており、売上返品は商品有高帳に未記帳である。
    const book=correctedBook+sampleAmt+returnAmt-salesReturnCost;
    const inv=correctedPhysical-valuationLoss;
    const cogs=openingInv+purchases-returnAmt-sampleAmt-correctedBook+valuationLoss;
    if(book<=0||cogs<=0||inv<=0)continue;

    // 恒等式：期首+当期仕入 = 仕入残+繰越+減耗+見本+仕入返品
    console.assert(cogs+inv+wear+sampleAmt+returnAmt===openingInv+purchases,'BUG:conservation');
    console.assert(correctedBook-correctedPhysical===wear,'BUG:wear');
    console.assert(book-returnAmt-sampleAmt+salesReturnCost===correctedBook,'BUG:book correction');

    return{openingInv,purchases,book,physical,returnAmt,valuationLoss,sampleAmt,
           correctedBook,correctedPhysical,inv,wear,cogs,salesReturnType,salesReturnCost,
           srInPhysical,srNotInPhysical};
  }
  return null;
}

function renderGiven(g){
  let h='';
  h+=`<div class="g-row"><span class="g-key">期首商品残高</span><span class="g-val">${fmt(g.openingInv)}</span></div>`;
  h+=`<div class="g-row"><span class="g-key">当期仕入</span><span class="g-val">${fmt(g.purchases)}</span></div>`;
  h+=`<div class="g-row"><span class="g-key">期末帳簿棚卸高（未処理事項反映前）</span><span class="g-val">${fmt(g.book)}</span></div>`;
  h+=`<div class="g-row"><span class="g-key">期末実地棚卸高</span><span class="g-val">${fmt(g.physical)}</span></div>`;
  const adj=[];
  if(g.returnAmt>0)adj.push(`期末近くに ${fmt(g.returnAmt)} を仕入先へ返品したが未処理`);
  if(g.salesReturnType===1)adj.push(`得意先から原価 ${fmt(g.salesReturnCost)} の商品が返品され、実地棚卸高には含まれているが、売上取消・商品有高帳への記帳が未処理`);
  if(g.salesReturnType===2)adj.push(`得意先から原価 ${fmt(g.salesReturnCost)} の商品が返品され、当社所有だが未着（売上取消・商品有高帳への記帳も未処理）`);
  if(g.valuationLoss>0)adj.push(`商品の一部に評価損 ${fmt(g.valuationLoss)} あり`);
  if(g.sampleAmt>0)adj.push(`見本品 ${fmt(g.sampleAmt)} を支出したが未処理`);
  h+=`<div class="g-head">決算整理事項</div>`;
  if(adj.length===0){
    h+=`<div class="g-row g-sub"><span class="g-key" style="min-width:auto">　追加事項なし</span></div>`;
  }else{
    for(const a of adj)h+=`<div class="g-row g-sub"><span class="g-key" style="min-width:auto">　・${a}</span></div>`;
  }
  document.getElementById('given-area').innerHTML=h;
}

function mark(id,ok){
  const el=document.getElementById(id);
  el.classList.remove('cell-ok','cell-ng');
  el.classList.add(ok?'cell-ok':'cell-ng');
}

function newQ(){
  const g=genQ();
  if(!g)return;
  STATE.g=g;
  STATE.graded=false;
  STATE.startTime=Date.now();
  renderGiven(g);
  for(const id of ['a-cbook','a-cphysical','a-inv','a-cogs','a-wear','a-sample']){
    const el=document.getElementById(id);
    el.value='';el.classList.remove('cell-ok','cell-ng');
  }
  for(const id of ['ng-cbook','ng-cphysical','ng-inv','ng-cogs','ng-wear','ng-sample']){
    const el=document.getElementById(id);el.style.display='none';el.textContent='';
  }
  resetExpressionPreviews();
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

function grade(){
  if(!STATE.g||STATE.graded)return;
  const g=STATE.g;
  const fields=[
    ['a-cbook','ng-cbook',g.correctedBook],
    ['a-cphysical','ng-cphysical',g.correctedPhysical],
    ['a-inv','ng-inv',g.inv],
    ['a-cogs','ng-cogs',g.cogs],
    ['a-wear','ng-wear',g.wear],
    ['a-sample','ng-sample',g.sampleAmt],
  ];
  let ok=0;
  for(const[id,ngId,exp]of fields){
    const val=parseNum(document.getElementById(id).value);
    const correct=Number.isFinite(val)&&val===exp;
    if(correct)ok++;
    mark(id,correct);
    const ng=document.getElementById(ngId);
    if(!correct){ng.textContent='正:'+fmt(exp);ng.style.display='inline';}
    else{ng.style.display='none';}
  }
  STATE.graded=true;
  STATE.total++;
  const allOk=ok===fields.length;
  if(allOk)STATE.perfect++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-perfect').textContent=STATE.perfect;

  const elapsed=fmtElapsed(Date.now()-STATE.startTime);
  const correctedBook=g.correctedBook;
  const correctedPhysical=g.correctedPhysical;
  const lines=[`所要時間：${elapsed}`];
  let i=1;

  if(g.salesReturnType===1){
    lines.push(`${i++}. 売上返品（実地棚卸高に含まれる）: 売上取消は (借)売上 / (貸)売掛金。商品有高帳では未処理なので、帳簿棚卸高に返品原価 ${fmt(g.salesReturnCost)} を加算して実地棚卸高と比較する。実地に既に含まれるため、繰越商品・仕入への個別仕訳は不要。`);
  }
  if(g.salesReturnType===2){
    lines.push(`${i++}. 売上返品（未着・当社所有）: 売上取消は (借)売上 / (貸)売掛金。商品有高帳に返品原価 ${fmt(g.salesReturnCost)} を加算し、実地棚卸高にも未着品として ${fmt(g.salesReturnCost)} を加算して比較する。`);
  }
  if(g.returnAmt>0){
    lines.push(`${i++}. 仕入返品: (借)買掛金 ${fmt(g.returnAmt)} / (貸)仕入 ${fmt(g.returnAmt)}`);
  }
  if(g.sampleAmt>0){
    lines.push(`${i++}. 見本品: (借)見本品費 ${fmt(g.sampleAmt)} / (貸)仕入 ${fmt(g.sampleAmt)}`);
  }

  const bookTerms=[`帳簿${fmt(g.book)}`];
  if(g.returnAmt>0)bookTerms.push(`− 仕入返品${fmt(g.returnAmt)}`);
  if(g.sampleAmt>0)bookTerms.push(`− 見本品${fmt(g.sampleAmt)}`);
  if(g.salesReturnCost>0)bookTerms.push(`＋ 売上返品${fmt(g.salesReturnCost)}`);
  lines.push(`${i++}. 修正後帳簿棚卸高 ＝ ${bookTerms.join(' ')} ＝ ${fmt(correctedBook)}`);

  const physicalTerms=[`実地${fmt(g.physical)}`];
  if(g.srNotInPhysical>0)physicalTerms.push(`＋ 未着返品${fmt(g.srNotInPhysical)}`);
  lines.push(`${i++}. 修正後実地棚卸高 ＝ ${physicalTerms.join(' ')} ＝ ${fmt(correctedPhysical)}`);

  lines.push(`${i++}. 期首振替: (借)仕入 ${fmt(g.openingInv)} / (貸)繰越商品 ${fmt(g.openingInv)}`);
  lines.push(`${i++}. 期末振替: (借)繰越商品 ${fmt(correctedBook)} / (貸)仕入 ${fmt(correctedBook)}`);
  lines.push(`${i++}. 棚卸減耗損: (借)棚卸減耗損 ${fmt(g.wear)} / (貸)繰越商品 ${fmt(g.wear)}　※修正後帳簿${fmt(correctedBook)} − 修正後実地${fmt(correctedPhysical)}`);
  if(g.valuationLoss>0){
    lines.push(`${i++}. 商品評価損の計上: (借)商品評価損 ${fmt(g.valuationLoss)} / (貸)繰越商品 ${fmt(g.valuationLoss)}`);
    lines.push(`${i++}. 商品評価損を仕入に含める振替: (借)仕入 ${fmt(g.valuationLoss)} / (貸)商品評価損 ${fmt(g.valuationLoss)}　※このドリルでは商品評価損を売上原価に含める前提`);
  }

  const invFormula=`修正後実地${fmt(correctedPhysical)} − 評価損${fmt(g.valuationLoss)}`;
  const cogsTerms=[`期首${fmt(g.openingInv)}`,`＋ 当期仕入${fmt(g.purchases)}`];
  if(g.returnAmt>0)cogsTerms.push(`− 仕入返品${fmt(g.returnAmt)}`);
  if(g.sampleAmt>0)cogsTerms.push(`− 見本品${fmt(g.sampleAmt)}`);
  cogsTerms.push(`− 修正後帳簿${fmt(correctedBook)}`,`＋ 評価損${fmt(g.valuationLoss)}`);
  const cogsFormula=cogsTerms.join(' ');
  lines.push(`<b>繰越商品</b> ＝ ${invFormula} ＝ ${fmt(g.inv)}`);
  lines.push(`<b>仕入</b> ＝ ${cogsFormula} ＝ ${fmt(g.cogs)}`);
  lines.push(`<b>棚卸減耗損</b> ＝ ${fmt(g.wear)}　／　<b>見本品費</b> ＝ ${fmt(g.sampleAmt)}`);

  // 仕入ボックス図：売上返品は修正後帳簿棚卸高に織り込み、二重計上しない。
  const drRows=[[`期首商品`,g.openingInv],[`当期仕入`,g.purchases]];
  if(g.valuationLoss>0)drRows.push([`商品評価損から振替`,g.valuationLoss]);
  const crRows=[];
  if(g.returnAmt>0)crRows.push([`仕入返品`,g.returnAmt]);
  if(g.sampleAmt>0)crRows.push([`見本品費`,g.sampleAmt]);
  crRows.push([`期末商品（修正後帳簿）`,correctedBook]);
  crRows.push([`残高（仕入）`,g.cogs]);
  const totalDr=drRows.reduce((s,[,v])=>s+v,0);
  const totalCr=crRows.reduce((s,[,v])=>s+v,0);
  const nRows=Math.max(drRows.length,crRows.length);
  let btBody='';
  for(let r=0;r<nRows;r++){
    const[dl,dv]=drRows[r]||['',''];
    const[cl,cv]=crRows[r]||['',''];
    const isCogs=r===crRows.length-1;
    btBody+=`<tr${isCogs?' class="bt-bold"':''}><td class="bt-lbl">${dl}</td><td class="bt-val">${dv!==''?fmt(dv):''}</td><td class="bt-lbl">${cl}</td><td class="bt-val">${cv!==''?fmt(cv):''}</td></tr>`;
  }
  const boxHtml=`<table class="box-t"><thead><tr><th colspan="4" class="bt-name">仕　入</th></tr><tr><th colspan="2" class="bt-side">借　方</th><th colspan="2" class="bt-side">貸　方</th></tr></thead><tbody>${btBody}<tr class="bt-total"><td colspan="2">${fmt(totalDr)}</td><td colspan="2">${fmt(totalCr)}</td></tr></tbody></table>`;

  // 繰越商品ボックス図
  const drRows2=[[`期首残高`,g.openingInv],[`期末商品（修正後帳簿）`,correctedBook]];
  const crRows2=[[`仕入(期首)`,g.openingInv]];
  if(g.wear>0)crRows2.push([`棚卸減耗損`,g.wear]);
  if(g.valuationLoss>0)crRows2.push([`商品評価損（計上）`,g.valuationLoss]);
  crRows2.push([`次期繰越`,g.inv]);
  const totalDr2=drRows2.reduce((s,[,v])=>s+v,0);
  const totalCr2=crRows2.reduce((s,[,v])=>s+v,0);
  const nRows2=Math.max(drRows2.length,crRows2.length);
  let btBody2='';
  for(let r=0;r<nRows2;r++){
    const[dl,dv]=drRows2[r]||['',''];
    const[cl,cv]=crRows2[r]||['',''];
    const isInv=r===crRows2.length-1;
    btBody2+=`<tr${isInv?' class="bt-bold"':''}><td class="bt-lbl">${dl}</td><td class="bt-val">${dv!==''?fmt(dv):''}</td><td class="bt-lbl">${cl}</td><td class="bt-val">${cv!==''?fmt(cv):''}</td></tr>`;
  }
  const boxHtml2=`<table class="box-t"><thead><tr><th colspan="4" class="bt-name">繰越商品</th></tr><tr><th colspan="2" class="bt-side">借　方</th><th colspan="2" class="bt-side">貸　方</th></tr></thead><tbody>${btBody2}<tr class="bt-total"><td colspan="2">${fmt(totalDr2)}</td><td colspan="2">${fmt(totalCr2)}</td></tr></tbody></table>`;

  // 商品評価損を仕入に含める経路を明示する補助ボックス。
  // これにより、仕入・繰越商品の各ボックスの「商品評価損」行と仕訳が一対一で対応する。
  let boxHtml3='';
  if(g.valuationLoss>0){
    const btBody3=`<tr><td class="bt-lbl">繰越商品</td><td class="bt-val">${fmt(g.valuationLoss)}</td><td class="bt-lbl">仕入</td><td class="bt-val">${fmt(g.valuationLoss)}</td></tr>`;
    boxHtml3=`<table class="box-t"><thead><tr><th colspan="4" class="bt-name">商品評価損</th></tr><tr><th colspan="2" class="bt-side">借　方</th><th colspan="2" class="bt-side">貸　方</th></tr></thead><tbody>${btBody3}<tr class="bt-total"><td colspan="2">${fmt(g.valuationLoss)}</td><td colspan="2">${fmt(g.valuationLoss)}</td></tr></tbody></table>`;
  }
  const boxNote=`<div class="hint" style="margin-top:2px">※仕入の期末商品は、棚卸減耗損・商品評価損を控除する前の「修正後帳簿棚卸高」。売上返品は、この金額に織り込んであり、ボックス内では二重表示しません。</div>`;
  const recon=`<div class="hint" style="margin-top:6px">${lines.join('<br>')}</div>`;
  document.getElementById('result-area').innerHTML=`<div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 全問正解！':'正解 '+ok+' / '+fields.length+' 個（赤セルに正答を表示）'}</div>`+boxHtml+boxHtml2+boxHtml3+boxNote+recon;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}

// セルフテスト
(function selfTest(){
  function solve(t,salesReturnType=0,salesReturnCost=0){
    const srNotInPhysical=salesReturnType===2?salesReturnCost:0;
    const correctedBook=t.book-t.returnAmt-t.sampleAmt+salesReturnCost;
    const correctedPhysical=t.physical+srNotInPhysical;
    const inv=correctedPhysical-t.valuationLoss;
    const cogs=t.openingInv+t.purchases-t.returnAmt-t.sampleAmt-correctedBook+t.valuationLoss;
    const wear=correctedBook-correctedPhysical;
    return{correctedBook,correctedPhysical,inv,cogs,wear};
  }

  // ケース1：売上返品なし。帳簿605=実地580+減耗5+見本品20。
  const t1={openingInv:420,purchases:1470,book:605,physical:580,returnAmt:0,valuationLoss:10,sampleAmt:20};
  const a1=solve(t1);
  console.assert(a1.correctedBook===585,'selfTest1:corrected book');
  console.assert(a1.correctedPhysical===580,'selfTest1:corrected physical');
  console.assert(a1.inv===570,'selfTest1:inv');
  console.assert(a1.cogs===1295,'selfTest1:cogs');
  console.assert(a1.wear===5,'selfTest1:wear');
  console.assert(a1.cogs+a1.inv+a1.wear+t1.sampleAmt+t1.returnAmt===t1.openingInv+t1.purchases,'selfTest1:conservation');

  // ケース2：売上返品・未着（原価30）。帳簿・実地の双方に30を加算する。
  const a2=solve(t1,2,30);
  console.assert(a2.correctedBook===615,'selfTest2:corrected book');
  console.assert(a2.correctedPhysical===610,'selfTest2:corrected physical');
  console.assert(a2.inv===600,'selfTest2:inv');
  console.assert(a2.cogs===1265,'selfTest2:cogs');
  console.assert(a2.wear===5,'selfTest2:wear');

  // ケース3：売上返品が実地に含まれる（原価30）。未処理の帳簿棚卸高は30少ない。
  const t3={...t1,book:575};
  const a3=solve(t3,1,30);
  console.assert(a3.correctedBook===585,'selfTest3:corrected book');
  console.assert(a3.correctedPhysical===580,'selfTest3:corrected physical');
  console.assert(a3.inv===570,'selfTest3:inv unchanged');
  console.assert(a3.cogs===1295,'selfTest3:cogs unchanged');
  console.assert(a3.wear===5,'selfTest3:wear');
})();

const cs={disp:'0',prev:null,op:null,fresh:true};
function calcIn(v){
  const s=cs;
  if(v==='C'){s.disp='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(v==='←'){s.disp=s.disp.length>1?s.disp.slice(0,-1):'0';}
  else if(v==='.'){if(s.fresh){s.disp='0.';s.fresh=false;}else if(!s.disp.includes('.'))s.disp+='.';}
  else if('0123456789'.includes(v)){
    if(s.fresh){s.disp=v==='0'?'0':v;s.fresh=false;}
    else s.disp=s.disp==='0'?v:s.disp+v;
  }else if(v==='%'){
    s.disp=String(parseFloat(s.disp)/100);s.fresh=true;
  }else if(['+','-','×','÷'].includes(v)){
    if(!s.fresh&&s.op!==null){s.prev=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(s.prev);}
    else{s.prev=parseFloat(s.disp);}
    s.op=v;s.fresh=true;
  }else if(v==='='){
    if(s.op!==null){const r=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(r);s.prev=null;s.op=null;s.fresh=true;}
  }
  document.getElementById('calc-disp').textContent=fmtCalc(s.disp);
}
function calcDo(a,b,op){if(op==='+')return a+b;if(op==='-')return a-b;if(op==='×')return a*b;if(op==='÷')return b?a/b:0;return b;}
function numStr(n){return String(Math.round(n*1e9)/1e9);}
function fmtCalc(s){const[i,d]=s.split('.');const f=i.replace(/\B(?=(\d{3})+(?!\d))/g,',');return d!==undefined?f+'.'+d:f;}
