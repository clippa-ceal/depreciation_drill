<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>車両買換えドリル</title>
<style>
:root{
  --color-bg:#F7F6F3;
  --color-card:#FFFFFF;
  --color-border:#E5E3DC;
  --color-border2:#D8D5CC;
  --color-text:#1A1A18;
  --color-text2:#6B6B64;
  --color-info:#185FA5;
  --color-bg-secondary:#F0EFEA;
  --radius-lg:16px;
  --radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:560px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center;color:var(--color-text)}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.g-row{display:flex;gap:8px;margin-bottom:6px;align-items:baseline}
.g-key{font-size:13px;color:var(--color-text2);min-width:180px}
.g-val{font-size:15px;font-weight:600;color:var(--color-text)}
.g-head{font-size:13px;font-weight:600;color:var(--color-info);margin:8px 0 4px}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
.cat-badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;margin-bottom:8px;margin-right:6px;font-weight:600;background:#E1EEF8;color:#185FA5}
.cat-badge.b2{background:#FAEEDA;color:#854F0B}
/* 補助計算 */
.aux-grid{display:grid;grid-template-columns:150px 1fr;gap:10px 12px;align-items:center;margin-bottom:10px}
.aux-grid .ans-label{font-size:14px;color:var(--color-text);font-weight:500}
.aux-grid .ans-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.aux-grid input{flex:1;min-width:0;width:100%;font-size:15px;padding:7px 10px;border:1px solid var(--color-border2);border-radius:6px;text-align:right;background:var(--color-card)}
.aux-grid input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
.aux-grid input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
.ans-ng-msg{font-size:11px;color:#A32D2D;font-weight:600;display:none}
/* 仕訳テーブル */
table.j-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
table.j-tbl th,table.j-tbl td{border:1px solid #ccc;padding:4px 6px}
table.j-tbl th{background:#F4F3EF;font-size:11px;color:var(--color-text2);font-weight:600;text-align:center}
table.j-tbl .acct{color:var(--color-text);width:30%}
table.j-tbl .acct select{width:100%;font-size:12px;padding:5px 4px;border:1px solid var(--color-border2);border-radius:5px;background:var(--color-card);outline:none;color:var(--color-text);appearance:none;-webkit-appearance:none}
table.j-tbl .acct select.cell-ok{border-color:#7FB04A;background:#F2F8EA}
table.j-tbl .acct select.cell-ng{border-color:#D98A8A;background:#FCF0F0}
table.j-tbl .amt{padding:2px 4px;width:20%}
table.j-tbl .amt input{width:100%;font-size:13px;padding:5px 4px;border:1px solid var(--color-border2);border-radius:5px;text-align:right;background:var(--color-card);font-variant-numeric:tabular-nums}
table.j-tbl .amt input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
table.j-tbl .amt input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
table.j-tbl tr.j-tot td{border:none;padding:2px 6px}
table.j-tbl .j-tot-lbl{font-size:11px;color:var(--color-text2);font-weight:600;text-align:center;padding-top:6px}
table.j-tbl .j-tot-val{font-size:15px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;color:var(--color-text)}
table.j-tbl .j-tot-val.j-tot-ok{color:#3B6D11}
table.j-tbl .j-tot-val.j-tot-ng{color:#A32D2D}
/* 正解仕訳表示 */
table.sol-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
table.sol-tbl th,table.sol-tbl td{border:1px solid #ccc;padding:3px 6px}
table.sol-tbl th{background:#F4F3EF;font-size:11px;color:var(--color-text2);font-weight:600;text-align:center}
table.sol-tbl td.a{width:30%}
table.sol-tbl td.v{width:20%;text-align:right;font-variant-numeric:tabular-nums}
.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
.calc-display{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:8px 12px;font-size:22px;font-weight:500;text-align:right;margin-bottom:8px;min-height:46px;overflow:hidden;white-space:nowrap;letter-spacing:0.02em}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn{width:auto;margin:0;font-size:18px;padding:13px 4px;border-radius:var(--radius-md);border:none;cursor:pointer;font-weight:400;line-height:1}
.calc-btn:active{opacity:0.75}
.calc-btn-num{background:var(--color-card);border:0.5px solid var(--color-border);color:var(--color-text)}
.calc-btn-op{background:#185FA5;color:#fff}
.calc-btn-fn{background:#D0CEC5;color:var(--color-text)}
.calc-btn-eq{background:var(--color-text);color:#fff}
.calc-btn-wide{grid-column:span 2}
</style>
</head>
<body>
<div id="app">
  <h1>車両買換えドリル</h1>
  <div class="nav">
    <a href="index.html">減価償却</a>
    <a href="pension.html">退職給付</a>
    <a href="purchases.html">仕入</a>
    <a href="lease.html">リース</a>
    <a href="trade.html" class="nav-on">買換え</a>
    <a href="wip.html">仕掛品</a>
    <a href="hedge.html">為替予約</a>
    <a href="cash.html">現金預金</a><a href="interest.html">利息</a><a href="stockoption.html">ストックオプション</a><a href="fxsec.html">外貨有価証券</a><a href="acqcost.html">付随費用</a>
  </div>
  <div class="stat-grid">
    <div class="stat"><span class="n" id="s-total">0</span><span class="l">問</span></div>
    <div class="stat"><span class="n" id="s-perfect">0</span><span class="l">全問正解</span></div>
  </div>

  <div class="card">
    <div id="badge-area"></div>
    <div class="label">与件（単位：千円）</div>
    <div id="given-area"></div>
  </div>

  <div class="card">
    <div class="label">補助計算</div>
    <div class="aux-grid">
      <span class="ans-label">旧車両の簿価<br><span style="font-size:11px;color:var(--color-text2)">（買換え時点）</span></span>
      <div class="ans-cell"><input type="text" id="a-bv" autocomplete="off"><span class="ans-ng-msg" id="ng-a-bv"></span></div>
    </div>
    <div class="label">買換えの仕訳（科目と金額を入力。不要な行は空欄のまま）</div>
    <div id="journal-area"></div>
    <div class="hint">下取価格が<b>時価を上回る</b>とき、超過分は新車両の値引き（取得原価から控除）。売却損益は時価−簿価。<br>時価の記載がなければ下取価格を時価とみなす。現金支払額は「定価−下取価格」。<br>借方・貸方の中は<b>順不同</b>で採点します。</div>
  </div>

  <div id="result-area"></div>
  <button id="btn-check" onclick="grade()">答え合わせ</button>
  <button id="btn-next" style="display:none" onclick="nextQ()">次の問題 →</button>

  <div class="card" style="margin-top:0.25rem">
    <div class="label" style="margin-bottom:6px">電卓</div>
    <div id="calc-disp" class="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-fn" onclick="calcIn('C')">C</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('←')">←</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('±')">±</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('÷')">÷</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('7')">7</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('8')">8</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('9')">9</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('×')">×</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('4')">4</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('5')">5</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('6')">6</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('-')">−</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('1')">1</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('2')">2</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('3')">3</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('+')">+</button>
      <button class="calc-btn calc-btn-num calc-btn-wide" onclick="calcIn('0')">0</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('.')">.</button>
      <button class="calc-btn calc-btn-eq" onclick="calcIn('=')">=</button>
    </div>
  </div>

<script>
let STATE={total:0,perfect:0,q:null,graded:false,startTime:0};
function fmtElapsed(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return m>0?`${m}分${r}秒`:`${r}秒`;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function fmt(n){const neg=n<0;const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'−':'')+s;}
function parseNum(v){
  if(v==null)return 0;
  let s=String(v).trim().replace(/[,，]/g,'').replace(/[ \t]/g,'')
    .replace(/[＋]/g,'+').replace(/[－−]/g,'-')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  if(s===''||s==='-')return 0;
  const n=parseInt(s,10);return isNaN(n)?0:n;
}

// 科目プルダウンの選択肢
const ACCTS=['','車両','車両減価償却累計額','減価償却費','固定資産売却損','固定資産売却益','現金','仮払消費税','仮受消費税','未収入金','未払金'];

// ============ 問題生成 ============
// パターン：時価の与え方（なし／下取価格>時価／下取価格=時価）× 買換え時期（期首／期中）
function genQ(){
  for(let t=0;t<8000;t++){
    const taxMode=Math.random()<1/4;               // 消費税あり（税抜経理・10%）
    const fvMode=taxMode?'none':pick(['none','premium','equal']);  // 消費税問題は時価論点と併用しない
    const midYear=Math.random()<0.5;
    const EL=pick([4,5,6,8]);
    const C0=EL*12*rand(30,90);           // EL×12の倍数 → 月割整数
    const annualDepr=C0/EL;
    const monthlyDepr=C0/(EL*12);
    const y=rand(1,EL-2);
    const accum=annualDepr*y;
    const m=midYear?rand(2,10):0;
    const midDepr=monthlyDepr*m;
    const bv=C0-accum-midDepr;
    if(bv<=0)continue;
    const gainSide=Math.random()<0.5;
    const delta=rand(2,20)*10;
    let FV=gainSide?bv+delta:bv-delta;
    FV=Math.round(FV/10)*10;
    if(FV<=0)continue;
    const gainLoss=FV-bv;
    if(gainLoss===0)continue;
    let T,discount=0;
    if(fvMode==='none'){T=FV;}
    else if(fvMode==='premium'){discount=rand(5,30)*10;T=FV+discount;}
    else{T=FV;}
    const P=Math.round((C0+rand(0,150)*10)/10)*10;
    if(P<=T)continue;
    const newCost=P-discount;
    // 消費税（税抜経理・10%）：仮払=新車定価×10%、仮受=下取価格×10%、現金は税込差額
    const vatIn=taxMode?Math.round(P*0.1):0;
    const vatOut=taxMode?Math.round(T*0.1):0;
    if(taxMode&&(P*0.1!==vatIn||T*0.1!==vatOut))continue;
    const cashPaid=(P-T)+(vatIn-vatOut);
    let bad=false;
    for(const v of[midDepr,bv,FV,T,newCost,cashPaid,vatIn,vatOut,Math.abs(gainLoss)])
      if(!Number.isInteger(v)||v<0){bad=true;break;}
    if(bad)continue;

    // ===== 仕訳（借方・貸方） =====
    const debits=[{acct:'車両減価償却累計額',amt:accum}];
    if(m>0)debits.push({acct:'減価償却費',amt:midDepr});
    debits.push({acct:'車両',amt:newCost});
    if(taxMode)debits.push({acct:'仮払消費税',amt:vatIn});
    if(gainLoss<0)debits.push({acct:'固定資産売却損',amt:-gainLoss});
    const credits=[{acct:'車両',amt:C0}];
    if(taxMode)credits.push({acct:'仮受消費税',amt:vatOut});
    credits.push({acct:'現金',amt:cashPaid});
    if(gainLoss>0)credits.push({acct:'固定資産売却益',amt:gainLoss});
    // 貸借一致チェック
    const dSum=debits.reduce((a,r)=>a+r.amt,0),cSum=credits.reduce((a,r)=>a+r.amt,0);
    if(dSum!==cSum)continue;

    // ===== 与件 =====
    const tradeMonth=m===0?'期首（4月1日）':`${(3+m)%12+1}月1日（期首から${m}ヶ月経過）`;
    let g=`<div class="g-head">旧車両</div>`;
    g+=`<div class="g-row"><span class="g-key">取得原価</span><span class="g-val">${fmt(C0)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">期首減価償却累計額</span><span class="g-val">${fmt(accum)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">減価償却</span><span class="g-val" style="font-size:13px">定額法・耐用年数${EL}年・残存価額0（記帳は間接法）</span></div>`;
    g+=`<div class="g-head">買換え（会計期間：4月1日〜3月31日）</div>`;
    g+=`<div class="g-row"><span class="g-key">買換え日</span><span class="g-val" style="font-size:14px">${tradeMonth}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">新車両の購入価額（定価${taxMode?'・税抜':''}）</span><span class="g-val">${fmt(P)}</span></div>`;
    g+=`<div class="g-row"><span class="g-key">旧車両の下取価格${taxMode?'（税抜）':''}</span><span class="g-val">${fmt(T)}</span></div>`;
    if(fvMode!=='none'){
      g+=`<div class="g-row"><span class="g-key">旧車両の時価（適正売却価額）</span><span class="g-val">${fmt(FV)}</span></div>`;
    }
    if(taxMode){
      g+=`<div class="g-row"><span class="g-key">消費税</span><span class="g-val" style="font-size:13px">税率10%・税抜経理方式（下取りは課税売上）</span></div>`;
    }
    g+=`<div class="g-row"><span class="g-key" style="min-width:auto">　※ 下取価格は新車両の購入代金に充当し、残額${taxMode?'（税込）':''}を現金で支払う</span></div>`;

    // ===== 解説 =====
    const explain=[];
    explain.push(`<b>① 旧車両の簿価</b>`);
    if(m>0){
      explain.push(`　期中償却費：${fmt(C0)} ÷ ${EL}年 ÷ 12 × ${m}ヶ月 ＝ ${fmt(midDepr)}`);
      explain.push(`　簿価 ＝ ${fmt(C0)} − ${fmt(accum)} − ${fmt(midDepr)} ＝ ${fmt(bv)}`);
    }else{
      explain.push(`　簿価 ＝ ${fmt(C0)} − ${fmt(accum)} ＝ ${fmt(bv)}`);
    }
    explain.push(`<b>② 下取価格と時価の比較</b>`);
    if(fvMode==='none'){
      explain.push(`　時価の記載なし → 下取価格 ${fmt(T)} を時価とみなす（値引きなし）`);
    }else if(fvMode==='premium'){
      explain.push(`　下取価格 ${fmt(T)} ＞ 時価 ${fmt(FV)} → 超過分 ${fmt(discount)} は<b>新車両の値引き</b>`);
    }else{
      explain.push(`　下取価格 ${fmt(T)} ＝ 時価 ${fmt(FV)} → 値引きなし（通常の売却処理）`);
    }
    explain.push(`<b>③ 旧車両の売却損益</b>　${fmt(FV)} − ${fmt(bv)} ＝ ${fmt(gainLoss)} → 売却${gainLoss>0?'益':'損'} ${fmt(Math.abs(gainLoss))}`);
    explain.push(`<b>④ 新車両の取得原価</b>　${fmt(P)}${discount>0?` − 値引き ${fmt(discount)} ＝ ${fmt(newCost)}`:'（定価どおり）'}${taxMode?'（税抜で計上）':''}`);
    if(taxMode){
      explain.push(`<b>⑤ 消費税（税抜経理・10%）</b>`);
      explain.push(`　仮払消費税 ＝ 新車定価 ${fmt(P)} × 10% ＝ ${fmt(vatIn)}（借方）`);
      explain.push(`　仮受消費税 ＝ 下取価格 ${fmt(T)} × 10% ＝ ${fmt(vatOut)}（貸方・下取りは課税売上）`);
      explain.push(`<b>⑥ 現金支払額（税込）</b>　（${fmt(P)}−${fmt(T)}）＋（${fmt(vatIn)}−${fmt(vatOut)}）＝ ${fmt(cashPaid)}`);
    }else{
      explain.push(`<b>⑤ 現金支払額</b>　定価 ${fmt(P)} − 下取価格 ${fmt(T)} ＝ ${fmt(cashPaid)}`);
    }

    const fvLabel={none:'時価の記載なし',premium:'下取価格＞時価',equal:'下取価格＝時価'}[fvMode];
    const badges=['車両の買換え',fvLabel,m===0?'期首':'期中'];
    if(taxMode)badges.push('消費税10%');
    return{
      badges,
      givenHTML:g,debits,credits,bv,explain,
      rowsFixed:taxMode?5:4,
    };
  }
  return null;
}

// ============ 描画 ============
function renderJournal(q){
  const rows=q.rowsFixed||4;  // 通常4行・消費税問題は5行固定（行数からヒントを与えない）
  const sel=id=>`<select id="${id}">${ACCTS.map(a=>`<option value="${a}">${a||'―'}</option>`).join('')}</select>`;
  let body='';
  for(let i=0;i<rows;i++){
    body+=`<tr>
      <td class="acct">${sel('jd-a-'+i)}</td>
      <td class="amt"><input type="text" inputmode="numeric" id="jd-v-${i}" autocomplete="off"></td>
      <td class="acct">${sel('jc-a-'+i)}</td>
      <td class="amt"><input type="text" inputmode="numeric" id="jc-v-${i}" autocomplete="off"></td>
    </tr>`;
  }
  body+=`<tr class="j-tot">
    <td colspan="2" class="j-tot-lbl">借方合計</td>
    <td colspan="2" class="j-tot-lbl">貸方合計</td>
  </tr>
  <tr class="j-tot">
    <td colspan="2" class="j-tot-val" id="jd-total">0</td>
    <td colspan="2" class="j-tot-val" id="jc-total">0</td>
  </tr>`;
  document.getElementById('journal-area').innerHTML=
    `<table class="j-tbl"><tr><th>借方科目</th><th>金額</th><th>貸方科目</th><th>金額</th></tr>${body}</table>`;
  for(let i=0;i<rows;i++){
    document.getElementById(`jd-v-${i}`).addEventListener('input',updateJournalTotals);
    document.getElementById(`jc-v-${i}`).addEventListener('input',updateJournalTotals);
  }
  updateJournalTotals();
  return rows;
}

function updateJournalTotals(){
  const rows=STATE.rows||0;
  let dSum=0,cSum=0,dAny=false,cAny=false;
  for(let i=0;i<rows;i++){
    const dv=document.getElementById(`jd-v-${i}`).value;
    const cv=document.getElementById(`jc-v-${i}`).value;
    if(dv.trim()!==''){dAny=true;dSum+=parseNum(dv);}
    if(cv.trim()!==''){cAny=true;cSum+=parseNum(cv);}
  }
  const dEl=document.getElementById('jd-total');
  const cEl=document.getElementById('jc-total');
  if(!dEl||!cEl)return;
  dEl.textContent=fmt(dSum);
  cEl.textContent=fmt(cSum);
  const balanced=dAny&&cAny&&dSum===cSum;
  const mismatched=dAny&&cAny&&dSum!==cSum;
  dEl.classList.toggle('j-tot-ok',balanced);
  cEl.classList.toggle('j-tot-ok',balanced);
  dEl.classList.toggle('j-tot-ng',mismatched);
  cEl.classList.toggle('j-tot-ng',mismatched);
}

function newQ(){
  const q=genQ();
  if(!q)return;
  STATE.q=q;STATE.graded=false;STATE.startTime=Date.now();
  document.getElementById('badge-area').innerHTML=
    q.badges.map((b,i)=>`<span class="cat-badge ${i===1?'b2':''}">${b}</span>`).join('');
  document.getElementById('given-area').innerHTML=q.givenHTML;
  STATE.rows=renderJournal(q);
  const bvEl=document.getElementById('a-bv');
  bvEl.value='';bvEl.classList.remove('cell-ok','cell-ng');
  document.getElementById('ng-a-bv').style.display='none';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

// ============ 採点（借方・貸方それぞれ順不同マッチ） ============
function gradeSide(prefix,expected,rows){
  // 期待値を行数まで空欄で埋める
  const exp=expected.map(e=>({acct:e.acct,amt:e.amt}));
  while(exp.length<rows)exp.push({acct:'',amt:0});
  const used=new Array(rows).fill(false);
  let ok=0;
  const marks=[];
  for(let i=0;i<rows;i++){
    const acct=document.getElementById(`${prefix}-a-${i}`).value;
    const amt=parseNum(document.getElementById(`${prefix}-v-${i}`).value);
    let hit=-1;
    for(let k=0;k<exp.length;k++){
      if(!used[k]&&exp[k].acct===acct&&exp[k].amt===amt){hit=k;break;}
    }
    if(hit>=0){used[hit]=true;ok++;marks.push(true);}
    else marks.push(false);
  }
  // 表示
  for(let i=0;i<rows;i++){
    const a=document.getElementById(`${prefix}-a-${i}`);
    const v=document.getElementById(`${prefix}-v-${i}`);
    for(const el of[a,v]){el.classList.remove('cell-ok','cell-ng');el.classList.add(marks[i]?'cell-ok':'cell-ng');}
  }
  return ok;
}

function grade(){
  if(!STATE.q||STATE.graded)return;
  const q=STATE.q;
  const rows=STATE.rows;
  let ok=0;
  // 簿価
  const bvEl=document.getElementById('a-bv');
  const bvOk=parseNum(bvEl.value)===q.bv;
  if(bvOk)ok++;
  bvEl.classList.remove('cell-ok','cell-ng');bvEl.classList.add(bvOk?'cell-ok':'cell-ng');
  const bvNg=document.getElementById('ng-a-bv');
  if(!bvOk){bvNg.textContent='正:'+fmt(q.bv);bvNg.style.display='inline';}
  else bvNg.style.display='none';
  // 仕訳
  ok+=gradeSide('jd',q.debits,rows);
  ok+=gradeSide('jc',q.credits,rows);
  const cnt=1+rows*2;

  STATE.graded=true;STATE.total++;
  const allOk=ok===cnt;
  if(allOk)STATE.perfect++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-perfect').textContent=STATE.perfect;
  const elapsed=fmtElapsed(Date.now()-STATE.startTime);

  // 正解仕訳の表示
  let solBody='';
  for(let i=0;i<rows;i++){
    const d=q.debits[i],c=q.credits[i];
    solBody+=`<tr><td class="a">${d?d.acct:''}</td><td class="v">${d?fmt(d.amt):''}</td><td class="a">${c?c.acct:''}</td><td class="v">${c?fmt(c.amt):''}</td></tr>`;
  }
  const sol=`<div class="label" style="margin-top:8px">正解の仕訳</div>
    <table class="sol-tbl"><tr><th>借方科目</th><th>金額</th><th>貸方科目</th><th>金額</th></tr>${solBody}</table>`;
  const recon=`<div class="hint" style="margin-top:6px">${['所要時間：'+elapsed].concat(q.explain).join('<br>')}</div>`;
  document.getElementById('result-area').innerHTML=
    `<div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 全問正解！':'正解 '+ok+' / '+cnt+' 箇所'}</div>`+sol+recon;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}
newQ();

const cs={disp:'0',prev:null,op:null,fresh:true};
function calcIn(v){
  const s=cs;
  if(v==='C'){s.disp='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(v==='←'){s.disp=s.disp.length>1?s.disp.slice(0,-1):'0';if(s.disp==='-')s.disp='0';}
  else if(v==='.'){if(s.fresh){s.disp='0.';s.fresh=false;}else if(!s.disp.includes('.'))s.disp+='.';}
  else if('0123456789'.includes(v)){
    if(s.fresh){s.disp=v==='0'?'0':v;s.fresh=false;}
    else s.disp=s.disp==='0'?v:s.disp+v;
  }else if(v==='±'){
    if(s.disp!=='0')s.disp=s.disp.startsWith('-')?s.disp.slice(1):'-'+s.disp;
  }else if(['+','-','×','÷'].includes(v)){
    if(!s.fresh&&s.op!==null){s.prev=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(s.prev);}
    else{s.prev=parseFloat(s.disp);}
    s.op=v;s.fresh=true;
  }else if(v==='='){
    if(s.op!==null){const r=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(r);s.prev=null;s.op=null;s.fresh=true;}
  }
  document.getElementById('calc-disp').textContent=fmtCalc(s.disp);
}
function calcDo(a,b,op){if(op==='+')return a+b;if(op==='-')return a-b;if(op==='×')return a*b;if(op==='÷')return b?a/b:0;return b;}
function numStr(n){return String(Math.round(n*1e9)/1e9);}
function fmtCalc(s){const[i,d]=s.split('.');const f=i.replace(/\B(?=(\d{3})+(?!\d))/g,',');return d!==undefined?f+'.'+d:f;}
