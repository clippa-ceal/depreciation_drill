<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>リースドリル２</title>
<style>
:root{
  --color-bg:#F7F6F3;
  --color-card:#FFFFFF;
  --color-border:#E5E3DC;
  --color-border2:#D8D5CC;
  --color-text:#1A1A18;
  --color-text2:#6B6B64;
  --color-info:#185FA5;
  --color-bg-secondary:#F0EFEA;
  --radius-lg:16px;
  --radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:520px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center;color:var(--color-text)}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.g-row{display:flex;gap:8px;margin-bottom:6px;align-items:baseline}
.g-key{font-size:13px;color:var(--color-text2);min-width:180px}
.g-val{font-size:15px;font-weight:600;color:var(--color-text)}
.g-head{font-size:13px;font-weight:600;color:var(--color-info);margin:8px 0 4px}
.rate-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.rate-tbl th,.rate-tbl td{border:1px solid #ccc;padding:5px 6px;text-align:center}
.rate-tbl th{background:#F4F3EF;font-weight:600;font-size:12px;color:var(--color-text2)}
.rate-tbl .rv{font-weight:600;font-variant-numeric:tabular-nums}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
.ans-section{font-size:13px;font-weight:600;color:var(--color-info);margin:10px 0 6px}
.ans-grid{display:grid;grid-template-columns:150px 1fr;gap:10px 12px;align-items:center}
.ans-grid .ans-label{font-size:14px;color:var(--color-text);font-weight:500}
.ans-grid .ans-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ans-grid input{flex:1;min-width:0;width:100%;font-size:15px;padding:7px 10px;border:1px solid var(--color-border2);border-radius:6px;text-align:right;background:var(--color-card)}
.ans-grid input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
.ans-grid input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
.ans-ng-msg{font-size:11px;color:#A32D2D;font-weight:600;display:none}
.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
.calc-display{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:8px 12px;font-size:22px;font-weight:500;text-align:right;margin-bottom:8px;min-height:46px;overflow:hidden;white-space:nowrap;letter-spacing:0.02em}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn{width:auto;margin:0;font-size:18px;padding:13px 4px;border-radius:var(--radius-md);border:none;cursor:pointer;font-weight:400;line-height:1}
.calc-btn:active{opacity:0.75}
.calc-btn-num{background:var(--color-card);border:0.5px solid var(--color-border);color:var(--color-text)}
.calc-btn-op{background:#185FA5;color:#fff}
.calc-btn-fn{background:#D0CEC5;color:var(--color-text)}
.calc-btn-eq{background:var(--color-text);color:#fff}
.calc-btn-wide{grid-column:span 2}
</style>
</head>
<body>
<div id="app">
  <h1>リースドリル２</h1>
  <div class="nav">
    <a href="index.html">減価償却</a>
    <a href="pension.html">退職給付</a>
    <a href="purchases.html">仕入</a>
    <a href="lease.html">リース</a>
    <a href="lease2.html" class="nav-on">リース２</a>
    <a href="wip.html">仕掛品</a>
    <a href="hedge.html">為替予約</a>
    <a href="hedge2.html">為替予約２</a>
    <a href="cash.html">現金預金</a>
  </div>
  <div class="stat-grid">
    <div class="stat"><span class="n" id="s-total">0</span><span class="l">問</span></div>
    <div class="stat"><span class="n" id="s-perfect">0</span><span class="l">全問正解</span></div>
  </div>

  <div class="card">
    <div class="label">与件（単位：千円）</div>
    <div id="given-area"></div>
  </div>

  <div class="card">
    <div class="label">解答</div>
    <div class="ans-grid">
      <span class="ans-label">リース資産計上額</span>
      <div class="ans-cell"><input type="text" id="a-asset" autocomplete="off"><span class="ans-ng-msg" id="ng-asset"></span></div>
      <span class="ans-label">年間減価償却費</span>
      <div class="ans-cell"><input type="text" id="a-depr" autocomplete="off"><span class="ans-ng-msg" id="ng-depr"></span></div>
      <span class="ans-label">利子相当額（総額）</span>
      <div class="ans-cell"><input type="text" id="a-inttot" autocomplete="off"><span class="ans-ng-msg" id="ng-inttot"></span></div>
      <span class="ans-label">年間支払利息</span>
      <div class="ans-cell"><input type="text" id="a-intyr" autocomplete="off"><span class="ans-ng-msg" id="ng-intyr"></span></div>
      <span class="ans-label">第1期末リース債務</span>
      <div class="ans-cell"><input type="text" id="a-liab1" autocomplete="off"><span class="ans-ng-msg" id="ng-liab1"></span></div>
    </div>
    <div class="hint">貸手の購入価額・計算利子率が不明 → リース資産は「リース料総額の現在価値（追加借入利子率で割引）」と「見積現金購入価額」の<b>いずれか低い方</b>で計上。<br>現在価値＝年額リース料 × 現価係数の合計。償却は移転外なので残存0・リース期間で定額法。利子は定額法（総額÷期間）。</div>
  </div>

  <div id="result-area"></div>
  <button id="btn-check" onclick="grade()">答え合わせ</button>
  <button id="btn-next" style="display:none" onclick="nextQ()">次の問題 →</button>

  <div class="card" style="margin-top:0.25rem">
    <div class="label" style="margin-bottom:6px">電卓</div>
    <div id="calc-disp" class="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-fn" onclick="calcIn('C')">C</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('←')">←</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('%')">%</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('÷')">÷</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('7')">7</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('8')">8</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('9')">9</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('×')">×</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('4')">4</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('5')">5</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('6')">6</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('-')">−</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('1')">1</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('2')">2</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('3')">3</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('+')">+</button>
      <button class="calc-btn calc-btn-num calc-btn-wide" onclick="calcIn('0')">0</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('.')">.</button>
      <button class="calc-btn calc-btn-eq" onclick="calcIn('=')">=</button>
    </div>
  </div>
</div>

<script>
let STATE={total:0,perfect:0,g:null,graded:false,startTime:0};
function fmtElapsed(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return m>0?`${m}分${r}秒`:`${r}秒`;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function fmt(n){const neg=n<0;const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'−':'')+s;}
function parseNum(v){
  if(v==null)return 0;
  let s=String(v).trim()
    .replace(/[,，]/g,'')
    .replace(/[ \t]/g,'')
    .replace(/[＋]/g,'+')
    .replace(/[－−]/g,'-')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  if(s===''||s==='-')return 0;
  if(s.includes('+')||s.replace(/^-/,'').includes('-')){
    const tokens=s.match(/[+-]?\d+/g)||[];
    return tokens.reduce((a,t)=>a+parseInt(t,10),0);
  }
  const n=parseInt(s,10);
  return isNaN(n)?0:n;
}

function genQ(){
  for(let t=0;t<4000;t++){
    const n=rand(3,5);                       // リース期間
    const ratePct=pick([5,6,7,8]);           // 追加借入利子率
    const r=ratePct/100;
    // 現価係数（小数第2位四捨五入）
    const coef=[];
    for(let k=1;k<=n;k++)coef.push(Math.round(100/Math.pow(1+r,k))/100);
    const S=Math.round(coef.reduce((a,c)=>a+c,0)*100)/100;   // 係数合計
    const annual=rand(10,30)*100;            // 年額リース料（百の倍数）
    const PV=Math.round(annual*S);           // リース料総額の現在価値
    // 見積現金購入価額（PV近辺の百の倍数、PVと異なる）
    const Pbase=Math.round(PV/100)*100;
    const off=(Math.random()<0.5?-1:1)*rand(1,6)*100;
    const P=Pbase+off;
    if(P<=0)continue;
    if(P===PV)continue;
    const capital=Math.min(PV,P);            // 計上額＝低い方
    if(capital%n!==0)continue;               // 償却費・元本が整数になる条件
    const total=annual*n;                    // リース料総額
    const interestTotal=total-capital;
    if(interestTotal<=0)continue;
    if(interestTotal%n!==0)continue;
    const annualDepr=capital/n;              // 残存0・リース期間で定額
    const annualInterest=interestTotal/n;    // 利子も定額法
    const principal1=annual-annualInterest;  // 第1期元本返済
    const y1liab=capital-principal1;
    if(annualInterest<=0||principal1<=0||y1liab<=0)continue;
    // 難易度のため低い方が PV / P 両方のパターンを許容
    const economicLife=n+rand(1,3);
    return{n,ratePct,coef,S,annual,PV,P,capital,total,interestTotal,
      annualDepr,annualInterest,principal1,y1liab,economicLife,takePV:capital===PV};
  }
  return null;
}

function renderGiven(g){
  let h='';
  h+=`<div class="g-row"><span class="g-key">取引の種類</span><span class="g-val" style="font-size:13px">所有権移転外ファイナンスリース</span></div>`;
  h+=`<div class="g-row"><span class="g-key">リース料（後払い）</span><span class="g-val">年額 ${fmt(g.annual)}（総額 ${fmt(g.total)}）</span></div>`;
  h+=`<div class="g-row"><span class="g-key">リース契約期間</span><span class="g-val">${g.n}年</span></div>`;
  h+=`<div class="g-row"><span class="g-key">借手の追加借入利子率</span><span class="g-val">年 ${g.ratePct}%</span></div>`;
  h+=`<div class="g-row"><span class="g-key">借手の見積現金購入価額</span><span class="g-val">${fmt(g.P)}</span></div>`;
  h+=`<div class="g-row"><span class="g-key">貸手の購入価額・利子率</span><span class="g-val" style="font-size:13px">明らかでない</span></div>`;
  h+=`<div class="g-row"><span class="g-key">経済的耐用年数</span><span class="g-val">${g.economicLife}年</span></div>`;
  h+=`<div class="g-head">年利率 ${g.ratePct}% の現価係数</div>`;
  let th='',td='';
  for(let k=1;k<=g.n;k++){th+=`<th>${k}年</th>`;td+=`<td class="rv">${g.coef[k-1].toFixed(2)}</td>`;}
  h+=`<table class="rate-tbl"><tr>${th}</tr><tr>${td}</tr></table>`;
  h+=`<div class="g-head">条件</div>`;
  h+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・減価償却方法：定額法（残存0・リース期間）</span></div>`;
  h+=`<div class="g-row"><span class="g-key" style="min-width:auto">　・利子相当額の配分：定額法</span></div>`;
  document.getElementById('given-area').innerHTML=h;
}

function mark(id,ok){
  const el=document.getElementById(id);
  el.classList.remove('cell-ok','cell-ng');
  el.classList.add(ok?'cell-ok':'cell-ng');
}

function newQ(){
  const g=genQ();
  if(!g)return;
  STATE.g=g;STATE.graded=false;STATE.startTime=Date.now();
  renderGiven(g);
  const ids=['a-asset','a-depr','a-inttot','a-intyr','a-liab1'];
  const ngIds=['ng-asset','ng-depr','ng-inttot','ng-intyr','ng-liab1'];
  for(const id of ids){const el=document.getElementById(id);el.value='';el.classList.remove('cell-ok','cell-ng');}
  for(const id of ngIds){const el=document.getElementById(id);el.style.display='none';el.textContent='';}
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

function grade(){
  if(!STATE.g||STATE.graded)return;
  const g=STATE.g;
  const fields=[
    ['a-asset','ng-asset',g.capital],
    ['a-depr','ng-depr',g.annualDepr],
    ['a-inttot','ng-inttot',g.interestTotal],
    ['a-intyr','ng-intyr',g.annualInterest],
    ['a-liab1','ng-liab1',g.y1liab],
  ];
  let ok=0;
  for(const[id,ngId,exp]of fields){
    const val=parseNum(document.getElementById(id).value);
    const correct=val===exp;
    if(correct)ok++;
    mark(id,correct);
    const ng=document.getElementById(ngId);
    if(!correct){ng.textContent='正:'+fmt(exp);ng.style.display='inline';}
    else{ng.style.display='none';}
  }
  STATE.graded=true;STATE.total++;
  const allOk=ok===fields.length;
  if(allOk)STATE.perfect++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-perfect').textContent=STATE.perfect;
  const elapsed=fmtElapsed(Date.now()-STATE.startTime);
  const lines=[`所要時間：${elapsed}`];
  const sumExpr=g.coef.map(c=>c.toFixed(2)).join('＋');
  lines.push(`<b>① 現在価値の算定（貸手の利率不明 → 追加借入利子率 ${g.ratePct}% で割引）</b>`);
  lines.push(`　現価係数合計 ＝ ${sumExpr} ＝ ${g.S.toFixed(2)}`);
  lines.push(`　PV ＝ ${fmt(g.annual)} × ${g.S.toFixed(2)} ＝ ${fmt(g.PV)}`);
  lines.push(`<b>② 計上額の判定（いずれか低い方）</b>`);
  lines.push(`　現在価値 ${fmt(g.PV)} ／ 見積現金購入価額 ${fmt(g.P)} → <b>${fmt(g.capital)}</b>（${g.takePV?'現在価値が低い':'見積購入価額が低い'}）`);
  lines.push(`<b>③ 減価償却（残存0・リース期間 ${g.n}年）</b>`);
  lines.push(`　${fmt(g.capital)} ÷ ${g.n}年 ＝ ${fmt(g.annualDepr)}`);
  lines.push(`<b>④ 利子相当額</b>`);
  lines.push(`　総額 ＝ リース料総額 ${fmt(g.total)} − 計上額 ${fmt(g.capital)} ＝ ${fmt(g.interestTotal)}`);
  lines.push(`　年間（定額）＝ ${fmt(g.interestTotal)} ÷ ${g.n}年 ＝ ${fmt(g.annualInterest)}`);
  lines.push(`<b>⑤ 第1期末リース債務</b>`);
  lines.push(`　元本返済 ＝ ${fmt(g.annual)} − ${fmt(g.annualInterest)} ＝ ${fmt(g.principal1)}`);
  lines.push(`　リース債務 ＝ ${fmt(g.capital)} − ${fmt(g.principal1)} ＝ ${fmt(g.y1liab)}`);
  const recon=`<div class="hint" style="margin-top:6px">${lines.join('<br>')}</div>`;
  document.getElementById('result-area').innerHTML=
    `<div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 全問正解！':'正解 '+ok+' / '+fields.length+' 個（赤セルに正答を表示）'}</div>`+recon;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}
newQ();

const cs={disp:'0',prev:null,op:null,fresh:true};
function calcIn(v){
  const s=cs;
  if(v==='C'){s.disp='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(v==='←'){s.disp=s.disp.length>1?s.disp.slice(0,-1):'0';}
  else if(v==='.'){if(s.fresh){s.disp='0.';s.fresh=false;}else if(!s.disp.includes('.'))s.disp+='.';}
  else if('0123456789'.includes(v)){
    if(s.fresh){s.disp=v==='0'?'0':v;s.fresh=false;}
    else s.disp=s.disp==='0'?v:s.disp+v;
  }else if(v==='%'){
    s.disp=String(parseFloat(s.disp)/100);s.fresh=true;
  }else if(['+','-','×','÷'].includes(v)){
    if(!s.fresh&&s.op!==null){s.prev=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(s.prev);}
    else{s.prev=parseFloat(s.disp);}
    s.op=v;s.fresh=true;
  }else if(v==='='){
    if(s.op!==null){const r=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(r);s.prev=null;s.op=null;s.fresh=true;}
  }
  document.getElementById('calc-disp').textContent=fmtCalc(s.disp);
}
function calcDo(a,b,op){if(op==='+')return a+b;if(op==='-')return a-b;if(op==='×')return a*b;if(op==='÷')return b?a/b:0;return b;}
function numStr(n){return String(Math.round(n*1e9)/1e9);}
function fmtCalc(s){const[i,d]=s.split('.');const f=i.replace(/\B(?=(\d{3})+(?!\d))/g,',');return d!==undefined?f+'.'+d:f;}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
