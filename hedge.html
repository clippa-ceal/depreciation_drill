<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>外貨ヘッジドリル</title>
<style>
:root{
  --color-bg:#F7F6F3;--color-card:#FFFFFF;--color-border:#E5E3DC;--color-border2:#D8D5CC;
  --color-text:#1A1A18;--color-text2:#6B6B64;--color-info:#185FA5;--color-bg-secondary:#F0EFEA;
  --radius-lg:16px;--radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:560px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:6px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
.badge{display:inline-block;font-size:12px;font-weight:600;color:#fff;background:var(--color-info);border-radius:999px;padding:3px 12px;margin-bottom:8px}
.badge.b2{background:#0F6E56}
.badge.b3{background:#7A4FA3}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
/* 与件テーブル */
.g-table{width:100%;border-collapse:collapse;font-size:13px}
.g-table td{padding:4px 6px;vertical-align:top}
.g-table .g-key{color:var(--color-text2);white-space:nowrap;width:1%;padding-right:12px}
.g-table .g-val{font-weight:600}
.g-table .g-sep{padding:6px 0 2px;font-size:12px;font-weight:600;color:var(--color-info);border-top:0.5px solid var(--color-border)}
/* レート表 */
.rate-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.rate-tbl th,.rate-tbl td{border:1px solid #ccc;padding:5px 8px;text-align:center}
.rate-tbl th{background:#F4F3EF;font-weight:600;font-size:12px;color:var(--color-text2)}
.rate-tbl td:first-child{text-align:left;color:var(--color-text2)}
.rate-tbl .rv{font-weight:600;font-variant-numeric:tabular-nums}
/* 仕訳テーブル */
.j-entry{margin-bottom:12px}
.j-title{font-size:13px;font-weight:600;color:var(--color-info);margin-bottom:4px}
table.j-tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
table.j-tbl th,table.j-tbl td{border:1px solid #ccc;padding:4px 6px}
table.j-tbl th{background:#F4F3EF;font-size:11px;color:var(--color-text2);font-weight:600;text-align:center}
table.j-tbl .acct{color:var(--color-text);width:30%}
table.j-tbl .acct select{width:100%;font-size:12px;padding:5px 4px;border:1px solid var(--color-border2);border-radius:5px;background:var(--color-card);outline:none;color:var(--color-text);appearance:none;-webkit-appearance:none}
table.j-tbl .acct select.cell-ok{border-color:#7FB04A;background:#F2F8EA}
table.j-tbl .acct select.cell-ng{border-color:#D98A8A;background:#FCF0F0}
table.j-tbl .amt{padding:2px 4px;width:20%}
table.j-tbl .amt input{width:100%;font-size:13px;padding:5px 4px;border:1px solid var(--color-border2);border-radius:5px;text-align:right;background:var(--color-card);font-variant-numeric:tabular-nums}
table.j-tbl .amt input.cell-ok{border-color:#7FB04A;background:#F2F8EA}
table.j-tbl .amt input.cell-ng{border-color:#D98A8A;background:#FCF0F0}
table.j-tbl .none{background:#FAF9F6}
.xvl-btn{display:block;width:100%;margin:3px 0 0;font-size:11px;padding:3px 4px;border:1px solid var(--color-border2);border-radius:5px;background:var(--color-bg-secondary);color:var(--color-text2);cursor:pointer;font-weight:600;line-height:1.2}
.xvl-btn:active{opacity:0.7}
.j-ng{font-size:10px;color:#A32D2D;font-weight:600;display:none;margin-top:1px}
.j-ng.j-ng-amt{text-align:right}
.noentry{font-size:12px;color:var(--color-text2);padding:6px 8px;border:1px dashed var(--color-border2);border-radius:6px}
/* 結果 */
.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
/* 電卓 */
.calc-display{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:8px 12px;font-size:22px;font-weight:500;text-align:right;margin-bottom:8px;min-height:46px;overflow:hidden;white-space:nowrap;letter-spacing:0.02em}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-btn{width:auto;margin:0;font-size:18px;padding:13px 4px;border-radius:var(--radius-md);border:none;cursor:pointer;font-weight:400;line-height:1}
.calc-btn:active{opacity:0.75}
.calc-btn-num{background:var(--color-card);border:0.5px solid var(--color-border);color:var(--color-text)}
.calc-btn-op{background:#185FA5;color:#fff}
.calc-btn-fn{background:#D0CEC5;color:var(--color-text)}
.calc-btn-eq{background:var(--color-text);color:#fff}
.calc-btn-wide{grid-column:span 2}
.calc-btn-push{background:#185FA5;color:#fff;font-size:13px;grid-column:span 4}
.kb-toggle{width:auto;margin:0;font-size:11px;padding:4px 10px;border-radius:999px;background:var(--color-bg-secondary);color:var(--color-text2);font-weight:600;border:0.5px solid var(--color-border2)}
.kb-toggle.kb-on{background:#185FA5;color:#fff;border-color:#185FA5}
</style>
</head>
<body>
<div id="app">
  <h1>外貨ヘッジドリル</h1>
  <div class="nav">
    <a href="index.html">減価償却</a>
    <a href="pension.html">退職給付</a>
    <a href="purchases.html">仕入</a>
    <a href="lease.html">リース</a><a href="trade.html">買換え</a>
    <a href="wip.html">仕掛品</a>
    <a href="hedge.html" class="nav-on">為替予約</a>
    <a href="cash.html">現金預金</a><a href="interest.html">利息</a><a href="stockoption.html">ストックオプション</a><a href="fxsec.html">外貨有価証券</a><a href="acqcost.html">付随費用</a><a href="compress.html">圧縮記帳</a><a href="tokushu.html">特殊商品</a><a href="aro.html">資産除去</a><a href="kashidaore.html">貸倒</a><a href="genson.html">減損</a><a href="honshiten.html">本支店</a>
  </div>
  <div class="stat-grid">
    <div class="stat"><span class="n" id="s-total">0</span><span class="l">問</span></div>
    <div class="stat"><span class="n" id="s-perfect">0</span><span class="l">全問正解</span></div>
  </div>

  <div class="card">
    <div id="given-area"></div>
  </div>

  <div class="card">
    <div class="label">仕訳（各空欄に科目名と金額を入力）</div>
    <div id="journal-area"></div>
  </div>

  <div id="result-area"></div>
  <button id="btn-check" onclick="grade()">答え合わせ</button>
  <button id="btn-next" style="display:none" onclick="nextQ()">次の問題 →</button>

  <div class="card" style="margin-top:0.25rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="label" style="margin-bottom:0">電卓</div>
      <button type="button" id="kb-toggle" class="kb-toggle" onclick="toggleKb()"></button>
    </div>
    <div id="calc-disp" class="calc-display">0</div>
    <div class="calc-grid">
      <button class="calc-btn calc-btn-push" onclick="calcToAns()">↑ 回答欄へ反映（選択中の欄へ）</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('C')">C</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('←')">←</button>
      <button class="calc-btn calc-btn-fn" onclick="calcIn('±')">±</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('÷')">÷</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('7')">7</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('8')">8</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('9')">9</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('×')">×</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('4')">4</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('5')">5</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('6')">6</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('-')">−</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('1')">1</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('2')">2</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('3')">3</button>
      <button class="calc-btn calc-btn-op" onclick="calcIn('+')">+</button>
      <button class="calc-btn calc-btn-num calc-btn-wide" onclick="calcIn('0')">0</button>
      <button class="calc-btn calc-btn-num" onclick="calcIn('.')">.</button>
      <button class="calc-btn calc-btn-eq" onclick="calcIn('=')">=</button>
    </div>
  </div>

<script>
let STATE={total:0,perfect:0,g:null,graded:false,startTime:0,answers:{},acctAnswers:{}};
function fmtElapsed(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),r=s%60;return m>0?`${m}分${r}秒`:`${r}秒`;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rand(0,arr.length-1)];}
function fmt(n){const neg=n<0;const s=Math.abs(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');return(neg?'−':'')+s;}
function fmtRate(r){return Number.isInteger(r)?r.toFixed(2):r.toFixed(2);}
function parseNum(v){
  if(v==null)return 0;
  let s=String(v).trim().replace(/[,，]/g,'').replace(/[ \t]/g,'')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  if(s===''||s==='-')return 0;
  const n=parseInt(s,10);return isNaN(n)?0:n;
}
function parseFloatJP(v){
  let s=String(v==null?'':v).trim().replace(/[,，]/g,'').replace(/[ \t]/g,'')
    .replace(/[０-９]/g,d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0)).replace(/．/g,'.');
  if(s===''||s==='-')return NaN;
  return parseFloat(s);
}
function mulFC(id){
  if(!STATE.g)return;
  const el=document.getElementById(id);
  const v=parseFloatJP(el.value);
  if(!isFinite(v)||v===0)return;
  el.value=String(Math.round(v*STATE.g.FC));
}
function defAcct(amt){return amt>0?'前払費用':'前受収益';}
function fxAcct(){return '為替差損益';}

function genQ(){
  for(let tries=0;tries<6000;tries++){
    const pattern=pick(['独立','予定','同時','事後']);
    const type=pick(['AR','AP']);
    const FC=rand(1,9)*10;
    const T=rand(4,12);
    const b=rand(2,T-1);
    let a=0;
    if(pattern==='事後'){a=rand(1,b-1);}

    const up=Math.random()<0.5?1:-1;
    const SR0=rand(100,130);
    const d1=up*rand(1,5)*0.5,d2=up*rand(1,5)*0.5,d3=up*rand(1,5)*0.5;
    const SR_a=SR0+d1, SR_b=SR_a+d2, SR_T=SR_b+d3;
    const sgnp=Math.random()<0.5?1:-1;
    const u0=rand(3,6),ua=rand(2,u0-1),ub=rand(1,ua);
    let FR0=SR0+sgnp*u0*0.5;
    let FR_a=SR_a+sgnp*ua*0.5;
    const FR_b=SR_b+sgnp*ub*0.5;
    let SRa=SR_a,FRa=FR_a;
    if(pattern==='同時'){SRa=SR0;FRa=FR0;}

    const entries=[];
    const E=(title,rows)=>entries.push({title,rows:rows.filter(r=>r.amt!==0)});

    if(pattern==='同時'||pattern==='事後'){
      const sAcct=type==='AR'?'売掛金':'買掛金';
      const sgnM=type==='AR'?1:-1;
      E('取引日',[
        type==='AR'?{acct:'売掛金',amt:+FC*SR0}:{acct:'仕入',amt:+FC*SR0},
        type==='AR'?{acct:'売上',amt:-FC*SR0}:{acct:'買掛金',amt:-FC*SR0},
      ]);
      const chokuchoku=FC*(SRa-SR0);
      const D=FC*(FRa-SRa);
      const monMove=sgnM*(FC*(FRa-SR0));
      const fxMove=type==='AR'?-chokuchoku:+chokuchoku;
      const defMove=type==='AR'?-D:+D;
      E(`${a===0?'予約日（＝取引日）':'予約日'}`,[
        {acct:sAcct,amt:monMove},
        {acct:fxAcct(),amt:fxMove},
        {acct:defAcct(defMove),amt:defMove},
      ]);
      const amort1=D*(b-a)/(T-a);
      const defAmort1=type==='AR'?+amort1:-amort1;
      E('決算日',[
        {acct:defAcct(defMove),amt:defAmort1},
        {acct:fxAcct(),amt:-defAmort1},
      ]);
      const rem=D*(T-b)/(T-a);
      const defAmort2=type==='AR'?+rem:-rem;
      E('決済日',[
        {acct:'現金預金',amt:type==='AR'?+FC*FRa:-FC*FRa},
        {acct:sAcct,amt:type==='AR'?-FC*FRa:+FC*FRa},
        {acct:defAcct(defMove),amt:defAmort2},
        {acct:fxAcct(),amt:-defAmort2},
      ]);
    } else if(pattern==='予定'){
      const fwdVal=type==='AR'?FC*(FR0-FR_b):FC*(FR_b-FR0);
      if(fwdVal===0)continue;
      const tax=fwdVal*3/10;
      E('予約日',[]);
      E('決算日（時価評価・税効果）',[
        {acct:'為替予約',amt:+fwdVal},
        {acct:fwdVal>0?'繰延税金負債':'繰延税金資産',amt:-tax},
        {acct:'繰延ヘッジ損益',amt:-(fwdVal-tax)},
      ]);
      E('翌期首（振戻し）',[
        {acct:'為替予約',amt:-fwdVal},
        {acct:fwdVal>0?'繰延税金負債':'繰延税金資産',amt:+tax},
        {acct:'繰延ヘッジ損益',amt:+(fwdVal-tax)},
      ]);
    } else {
      const sAcct=type==='AR'?'売掛金':'買掛金';
      const sgnM=type==='AR'?1:-1;
      E('取引日',[
        type==='AR'?{acct:'売掛金',amt:+FC*SR0}:{acct:'仕入',amt:+FC*SR0},
        type==='AR'?{acct:'売上',amt:-FC*SR0}:{acct:'買掛金',amt:-FC*SR0},
      ]);
      E('決算日①',[
        {acct:sAcct,amt:sgnM*FC*(SR_b-SR0)},
        {acct:fxAcct(),amt:type==='AR'?-FC*(SR_b-SR0):+FC*(SR_b-SR0)},
      ]);
      const fwdVal=type==='AR'?FC*(FR0-FR_b):FC*(FR_b-FR0);
      E('決算日②',[
        {acct:'為替予約',amt:+fwdVal},
        {acct:fxAcct(),amt:-fwdVal},
      ]);
      E('決済日①',[
        {acct:'現金預金',amt:type==='AR'?+FC*SR_T:-FC*SR_T},
        {acct:sAcct,amt:type==='AR'?-FC*SR_b:+FC*SR_b},
        {acct:fxAcct(),amt:type==='AR'?-FC*(SR_T-SR_b):+FC*(SR_T-SR_b)},
      ]);
      const fwdCash=type==='AR'?FC*(FR0-SR_T):FC*(SR_T-FR0);
      E('決済日②',[
        {acct:'現金預金',amt:fwdCash},
        {acct:'為替予約',amt:-fwdVal},
        {acct:fxAcct(),amt:-(fwdCash-fwdVal)},
      ]);
    }

    let bad=false;
    for(const e of entries){let s=0;for(const r of e.rows){if(!Number.isInteger(r.amt))bad=true;s+=r.amt;}if(Math.abs(s)>1e-6)bad=true;}
    if(bad)continue;
    if(entries.some(e=>e.rows.length===0&&!/決算|予約日/.test(e.title)))continue;

    return{pattern,type,FC,T,a,b,SR0,SR_a:SRa,SR_b,SR_T,FR0,FR_a:FRa,FR_b,up,lockRate:FRa,entries};
  }
  return null;
}

function lastDay(m){return[31,28,31,30,31,30,31,31,30,31,30,31][m-1];}
function moff(base,delta){return((base-1+delta)%12+12)%12+1;}
function mds(m,dy){return`${m}月${dy}日`;}
function getDates(g){
  const sm=3;
  const tm=moff(sm,-g.b);
  const bm=g.pattern==='同時'?tm:moff(sm,-(g.b-g.a));
  const pm=moff(sm,g.T-g.b);
  return{trade:mds(tm,1),book:mds(bm,1),close:'3月31日',pay:mds(pm,lastDay(pm))};
}
function renderGiven(g){
  const isPlan=g.pattern==='予定';
  const dir=isPlan
    ?(g.type==='AR'?'輸出の予定取引（外貨売り予約でヘッジ）':'輸入の予定取引（外貨買い予約でヘッジ）')
    :(g.type==='AR'?'輸出取引（売掛金）':'輸入取引（買掛金）');
  const pname={'同時':'振当処理（取引時予約）','事後':'振当処理（取引後予約）','独立':'独立処理','予定':'予定取引（繰延ヘッジ）'}[g.pattern];
  const badgeClass=g.pattern==='独立'?'b2':isPlan?'b3':'';
  const d=getDates(g);
  let h=`<span class="badge ${badgeClass}">${pname}</span>`;
  h+=`<table class="g-table">
    <tr><td class="g-key">取引</td><td class="g-val">${dir}</td></tr>
    <tr><td class="g-key">外貨建金額</td><td class="g-val">${fmt(g.FC)} 通貨単位（FC）</td></tr>
    ${isPlan?`<tr><td class="g-key">実行予定</td><td class="g-val">翌期（決済日 ${d.pay}）</td></tr>
    <tr><td class="g-key">実効税率</td><td class="g-val">30%</td></tr>`:''}
  </table>`;
  let rows='';
  if(g.pattern==='同時'){
    rows=`<tr><td>${d.trade}（取引日・予約日）</td><td class="rv">${fmtRate(g.SR0)}</td><td class="rv">${fmtRate(g.FR0)}</td></tr>
          <tr><td>${d.close}（決算日）</td><td class="rv">${fmtRate(g.SR_b)}</td><td class="rv">${fmtRate(g.FR_b)}</td></tr>
          <tr><td>${d.pay}（決済日）</td><td class="rv">${fmtRate(g.SR_T)}</td><td class="rv">${fmtRate(g.SR_T)}</td></tr>`;
  }else if(g.pattern==='事後'){
    rows=`<tr><td>${d.trade}（取引日）</td><td class="rv">${fmtRate(g.SR0)}</td><td class="rv">${fmtRate(g.FR0)}</td></tr>
          <tr><td>${d.book}（予約日）</td><td class="rv">${fmtRate(g.SR_a)}</td><td class="rv">${fmtRate(g.FR_a)}</td></tr>
          <tr><td>${d.close}（決算日）</td><td class="rv">${fmtRate(g.SR_b)}</td><td class="rv">${fmtRate(g.FR_b)}</td></tr>
          <tr><td>${d.pay}（決済日）</td><td class="rv">${fmtRate(g.SR_T)}</td><td class="rv">${fmtRate(g.SR_T)}</td></tr>`;
  }else if(isPlan){
    rows=`<tr><td>${d.trade}（予約日）</td><td class="rv">${fmtRate(g.SR0)}</td><td class="rv">${fmtRate(g.FR0)}</td></tr>
          <tr><td>${d.close}（決算日）</td><td class="rv">${fmtRate(g.SR_b)}</td><td class="rv">${fmtRate(g.FR_b)}</td></tr>`;
  }else{
    rows=`<tr><td>${d.trade}（取引日）</td><td class="rv">${fmtRate(g.SR0)}</td><td class="rv">${fmtRate(g.FR0)}</td></tr>
          <tr><td>${d.close}（決算日）</td><td class="rv">${fmtRate(g.SR_b)}</td><td class="rv">${fmtRate(g.FR_b)}</td></tr>
          <tr><td>${d.pay}（決済日）</td><td class="rv">${fmtRate(g.SR_T)}</td><td class="rv">${fmtRate(g.SR_T)}</td></tr>`;
  }
  h+=`<table class="rate-tbl"><tr><th>日付</th><th>直物相場</th><th>先物相場</th></tr>${rows}</table>`;
  if(g.pattern==='同時'){
    h+=`<div class="hint">予約相場 ${fmtRate(g.FR0)} で債権債務を固定。直先差額を取引日〜決済日の期間で配分（決算日 3月31日まで当期分）。</div>`;
  }else if(g.pattern==='事後'){
    h+=`<div class="hint">予約相場 ${fmtRate(g.FR_a)}。直直差額は当期の損益。直先差額は予約日〜決済日の期間で配分（決算日 3月31日まで当期分）。</div>`;
  }else if(isPlan){
    h+=`<div class="hint">予約相場 ${fmtRate(g.FR0)}。予定取引のヘッジなので予約日は仕訳なし。決算日に為替予約を時価評価し、評価差額は税効果（30%）適用後の純額を繰延ヘッジ損益（純資産）として繰り延べる。翌期首に振り戻す。</div>`;
  }else{
    h+=`<div class="hint">予約相場 ${fmtRate(g.FR0)}。債権債務は直物で換算替えし、為替予約はデリバティブとして時価評価（ともに当期損益）。</div>`;
  }
  document.getElementById('given-area').innerHTML=h;
}

function renderJournal(g){
  STATE.answers={};
  STATE.acctAnswers={};
  let html='';
  g.entries.forEach((e,ei)=>{
    const debits=e.rows.filter(r=>r.amt>0);
    const credits=e.rows.filter(r=>r.amt<0);
    if(debits.length===0&&credits.length===0){
      html+=`<div class="j-entry"><div class="j-title">${e.title}</div><div class="noentry">仕訳なし</div></div>`;
      return;
    }
    const n=Math.max(debits.length,credits.length);
    let body='';
    for(let i=0;i<n;i++){
      const dr=debits[i],cr=credits[i];
      body+=`<tr>${cell(dr,ei,'d',i)}${cell(cr,ei,'c',i)}</tr>`;
    }
    html+=`<div class="j-entry"><div class="j-title">${e.title}</div>
      <table class="j-tbl"><tr><th>借方科目</th><th>金額</th><th>貸方科目</th><th>金額</th></tr>${body}</table></div>`;
  });
  document.getElementById('journal-area').innerHTML=html;
}

const ACCTS=['','売掛金','売上','仕入','買掛金','現金預金','為替差損益','前払費用','前受収益','為替予約','繰延ヘッジ損益','繰延税金資産','繰延税金負債'];
function acctSelect(id){
  const opts=ACCTS.map(a=>`<option value="${a}">${a||'―'}</option>`).join('');
  return `<select id="${id}">${opts}</select>`;
}
function cell(mv,ei,side,i){
  const id=`in-${ei}-${side}-${i}`;
  STATE.answers[id]=mv?Math.abs(mv.amt):0;
  STATE.acctAnswers[id+'_acct']=mv?mv.acct:'';
  return `<td class="acct">${acctSelect(id+'_acct')}<div class="j-ng" id="ng-${id}_acct"></div></td><td class="amt"><input type="text" inputmode="numeric" id="${id}" autocomplete="off"><button type="button" class="xvl-btn" onclick="mulFC('${id}')">xvl</button><div class="j-ng j-ng-amt" id="ng-${id}"></div></td>`;
}

// --- ソフトキーボード対策 ---
// ボタン押下で入力欄のフォーカスを奪わない（キーボードの出入りによる画面のバウンド防止）
document.addEventListener('mousedown',e=>{
  if(e.target&&e.target.closest&&e.target.closest('button'))e.preventDefault();
},true);
// 直近にフォーカスした金額欄を覚えておく（電卓からの反映先）
let lastAmt=null;
document.addEventListener('focusin',e=>{
  if(e.target&&e.target.matches&&e.target.matches('.amt input'))lastAmt=e.target;
});
// キーボードOFF（既定）：金額欄をタップしてもOSキーボードを出さず、電卓＋反映で入力する
let kbOff=localStorage.getItem('hedgeKbOff')!=='0';
function applyKb(){
  document.querySelectorAll('.amt input').forEach(el=>el.setAttribute('inputmode',kbOff?'none':'numeric'));
  const t=document.getElementById('kb-toggle');
  if(t){t.textContent=kbOff?'⌨ キーボード OFF':'⌨ キーボード ON';t.classList.toggle('kb-on',!kbOff);}
}
function toggleKb(){kbOff=!kbOff;localStorage.setItem('hedgeKbOff',kbOff?'1':'0');applyKb();}
// 電卓の値を、選択中（直近フォーカス）の金額欄へ反映。未選択なら最初の空欄へ
function calcToAns(){
  if(!STATE.g||STATE.graded)return;
  const n=parseFloat(cs.disp);
  if(isNaN(n))return;
  let el=(lastAmt&&document.contains(lastAmt))?lastAmt:null;
  if(!el)el=[...document.querySelectorAll('.amt input')].find(i=>i.value.trim()==='');
  if(el){el.value=String(Math.round(n));el.focus();lastAmt=el;}
}

function newQ(){
  const g=genQ();if(!g)return;
  STATE.g=g;STATE.graded=false;STATE.startTime=Date.now();
  lastAmt=null;
  renderGiven(g);renderJournal(g);applyKb();
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

function grade(){
  if(!STATE.g||STATE.graded)return;
  const amtIds=Object.keys(STATE.answers);
  const acctIds=Object.keys(STATE.acctAnswers);
  const total=amtIds.length+acctIds.length;
  let ok=0;

  for(const id of amtIds){
    const exp=STATE.answers[id];
    const el=document.getElementById(id);
    const val=parseNum(el.value);
    const correct=val===exp;
    if(correct)ok++;
    el.classList.remove('cell-ok','cell-ng');el.classList.add(correct?'cell-ok':'cell-ng');
    const ng=document.getElementById('ng-'+id);
    if(!correct){ng.textContent='正 '+(exp===0?'空欄':fmt(exp));ng.style.display='block';}
    else ng.style.display='none';
  }

  for(const aid of acctIds){
    const exp=STATE.acctAnswers[aid];
    const el=document.getElementById(aid);
    const val=el.value||'';
    const correct=val===exp;
    if(correct)ok++;
    el.classList.remove('cell-ok','cell-ng');el.classList.add(correct?'cell-ok':'cell-ng');
    const ng=document.getElementById('ng-'+aid);
    if(!correct){ng.textContent='正 '+(exp===''?'空欄':exp);ng.style.display='block';}
    else ng.style.display='none';
  }

  STATE.graded=true;STATE.total++;
  const allOk=ok===total;
  if(allOk)STATE.perfect++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-perfect').textContent=STATE.perfect;
  const elapsed=fmtElapsed(Date.now()-STATE.startTime);

  const g=STATE.g;
  const lines=[`所要時間：${elapsed}`];
  const FCf=fmt(g.FC);
  if(g.pattern==='同時'){
    const D=g.FC*Math.abs(g.FR0-g.SR0);
    lines.push(`<b>振当処理（取引時予約）</b>`);
    lines.push(`売上・取引日の債権債務は直物 ${fmtRate(g.SR0)} で計上 → ${FCf}×${fmtRate(g.SR0)} ＝ ${fmt(g.FC*g.SR0)}`);
    lines.push(`債権債務を予約相場 ${fmtRate(g.FR0)} に振当 → 差額（直先差額）${FCf}×|${fmtRate(g.FR0)}−${fmtRate(g.SR0)}| ＝ ${fmt(D)} を繰延`);
    lines.push(`直先差額を ${g.T}ヶ月で配分：当期 ${fmt(Math.round(D*g.b/g.T))}（${g.b}/${g.T}）、決済時 残り`);
  }else if(g.pattern==='事後'){
    const cc=g.FC*Math.abs(g.SR_a-g.SR0);
    const D=g.FC*Math.abs(g.FR_a-g.SR_a);
    lines.push(`<b>振当処理（取引後予約）</b>`);
    lines.push(`取引日：直物 ${fmtRate(g.SR0)} で計上 → ${fmt(g.FC*g.SR0)}`);
    lines.push(`予約日に振当：直直差額 ${FCf}×|${fmtRate(g.SR_a)}−${fmtRate(g.SR0)}| ＝ ${fmt(cc)}（当期の為替差損益）`);
    lines.push(`　　　　　　直先差額 ${FCf}×|${fmtRate(g.FR_a)}−${fmtRate(g.SR_a)}| ＝ ${fmt(D)}（繰延 → ${g.T-g.a}ヶ月で配分）`);
    lines.push(`決算日：直先差額の当期配分 ${fmt(Math.round(D*(g.b-g.a)/(g.T-g.a)))}（${g.b-g.a}/${g.T-g.a}）`);
    lines.push(`決済日：予約相場 ${fmtRate(g.FR_a)} で決済（${fmt(g.FC*g.FR_a)}）＋ 残りの直先差額を配分`);
  }else if(g.pattern==='予定'){
    const fwdVal=g.type==='AR'?g.FC*(g.FR0-g.FR_b):g.FC*(g.FR_b-g.FR0);
    const fv=Math.abs(fwdVal),tax=fv*3/10;
    lines.push(`<b>予定取引（繰延ヘッジ）</b>`);
    lines.push(`予約日：為替予約を締結しただけ（ヘッジ対象の予定取引は未発生）→ 仕訳なし`);
    lines.push(`決算日：為替予約の時価評価 ${FCf}×|${fmtRate(g.FR0)}−${fmtRate(g.FR_b)}| ＝ ${fmt(fv)}（評価${fwdVal>0?'益':'損'}）`);
    lines.push(`税効果：${fmt(fv)}×30% ＝ ${fmt(tax)} → ${fwdVal>0?'繰延税金負債':'繰延税金資産'}`);
    lines.push(`純額 ${fmt(fv-tax)} を繰延ヘッジ損益として純資産に繰延（P/Lには計上しない）`);
    lines.push(`翌期首：振戻し（逆仕訳）。ヘッジ損益は予定取引の実行時に認識される。`);
  }else{
    const monL=g.FC*Math.abs(g.SR_b-g.SR0);
    const fwdL=g.FC*Math.abs((g.type==='AR'?(g.FR0-g.FR_b):(g.FR_b-g.FR0)));
    lines.push(`<b>独立処理</b>`);
    lines.push(`決算日① 債権債務の換算替え：${FCf}×|${fmtRate(g.SR_b)}−${fmtRate(g.SR0)}| ＝ ${fmt(monL)}`);
    lines.push(`決算日② 為替予約の時価評価：${FCf}×（先物相場の変動 ${fmtRate(g.FR0)}→${fmtRate(g.FR_b)}）＝ ${fmt(fwdL)}`);
    lines.push(`→ 債権債務の損益と予約の損益がほぼ相殺（ヘッジ効果）。両方とも当期損益に計上。`);
    lines.push(`決済日：債権債務は直物 ${fmtRate(g.SR_T)} で決済、為替予約は差金決済。`);
  }
  const recon=`<div class="hint" style="margin-top:6px">${lines.join('<br>')}</div>`;
  document.getElementById('result-area').innerHTML=
    `<div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 全問正解！':'正解 '+ok+' / '+total+' 箇所（赤枠に正答を表示）'}</div>`+recon;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}
newQ();

const cs={disp:'0',prev:null,op:null,fresh:true};
function calcIn(v){
  const s=cs;
  if(v==='C'){s.disp='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(v==='←'){s.disp=s.disp.length>1?s.disp.slice(0,-1):'0';if(s.disp==='-')s.disp='0';}
  else if(v==='.'){if(s.fresh){s.disp='0.';s.fresh=false;}else if(!s.disp.includes('.'))s.disp+='.';}
  else if('0123456789'.includes(v)){if(s.fresh){s.disp=v==='0'?'0':v;s.fresh=false;}else s.disp=s.disp==='0'?v:s.disp+v;}
  else if(v==='±'){if(s.disp!=='0')s.disp=s.disp.startsWith('-')?s.disp.slice(1):'-'+s.disp;}
  else if(['+','-','×','÷'].includes(v)){
    if(!s.fresh&&s.op!==null){s.prev=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(s.prev);}
    else s.prev=parseFloat(s.disp);
    s.op=v;s.fresh=true;
  }else if(v==='='){
    if(s.op!==null){const r=calcDo(s.prev,parseFloat(s.disp),s.op);s.disp=numStr(r);s.prev=null;s.op=null;s.fresh=true;}
  }
  document.getElementById('calc-disp').textContent=fmtCalc(s.disp);
}
function calcDo(a,b,op){if(op==='+')return a+b;if(op==='-')return a-b;if(op==='×')return a*b;if(op==='÷')return b?a/b:0;return b;}
function numStr(n){return String(Math.round(n*1e9)/1e9);}
function fmtCalc(s){const[i,d]=s.split('.');const f=i.replace(/\B(?=(\d{3})+(?!\d))/g,',');return d!==undefined?f+'.'+d:f;}
