<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>現金預金ドリル</title>
<style>
:root{
  --color-bg:#F7F6F3;
  --color-card:#FFFFFF;
  --color-border:#E5E3DC;
  --color-border2:#D8D5CC;
  --color-text:#1A1A18;
  --color-text2:#6B6B64;
  --color-info:#185FA5;
  --color-bg-secondary:#F0EFEA;
  --radius-lg:16px;
  --radius-md:10px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
#app{padding:1rem;max-width:520px;margin:0 auto}
h1{font-size:18px;font-weight:600;margin-bottom:0.75rem;text-align:center;color:var(--color-text)}
.nav{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.nav a{font-size:13px;padding:6px 16px;border-radius:999px;text-decoration:none;color:var(--color-text2);background:var(--color-bg-secondary);font-weight:500}
.nav a.nav-on{background:var(--color-text);color:#fff}
.card{background:var(--color-card);border:0.5px solid var(--color-border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.label{font-size:13px;color:var(--color-text2);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text2);line-height:1.7;margin-top:8px}
button{width:100%;margin-bottom:8px;font-size:15px;padding:13px;border:none;border-radius:var(--radius-md);background:var(--color-text);color:#fff;font-weight:500;cursor:pointer}
button:active{opacity:0.85}
.stat-grid{display:flex;gap:14px;margin-bottom:0.75rem;justify-content:flex-end}
.stat{background:transparent;padding:0;display:flex;align-items:baseline;gap:3px}
.stat .n{font-size:14px;font-weight:600;color:var(--color-text)}
.stat .l{font-size:12px;color:var(--color-text2)}
.cat-badge{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;margin-bottom:10px;font-weight:500;background:#EAF3DE;color:#3B6D11}
.q-num{display:inline-block;font-size:11px;padding:2px 10px;border-radius:999px;margin-bottom:10px;margin-right:6px;font-weight:600;background:var(--color-text);color:#fff;font-variant-numeric:tabular-nums}
.cat-genkin{background:#FAEEDA;color:#854F0B}
.cat-touza{background:#E1EEF8;color:#185FA5}
.cat-kogu{background:#E8E1F0;color:#5A3D8A}
.q-text{font-size:15px;line-height:1.75;color:var(--color-text)}

.je-slots{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.je-slot{padding:10px 12px;border:1.5px solid var(--color-border2);border-radius:10px;background:#FAFAF8;text-align:center;transition:border-color .15s,background .15s}
.je-slot.active{border-color:var(--color-info);background:#EAF3FB;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
.je-slot.filled{border-color:var(--color-text);background:var(--color-card)}
.je-slot.ok{border-color:#7FB04A;background:#F2F8EA}
.je-slot.ng{border-color:#D98A8A;background:#FCF0F0}
.je-slot-label{font-size:11px;color:var(--color-text2);font-weight:600;margin-bottom:3px;letter-spacing:0.05em}
.je-slot-val{font-size:16px;font-weight:600;min-height:22px;color:var(--color-text)}
.je-slot-val.empty{color:#BBB8AE;font-weight:400}
.je-status{font-size:12px;color:var(--color-info);text-align:center;margin:10px 0 6px;font-weight:500;min-height:18px}
.je-status.done{color:var(--color-text2)}
.je-status.warn{color:#A32D2D}

.acct-label{font-size:11px;color:var(--color-text2);font-weight:600;margin:6px 0 6px;letter-spacing:0.05em}
.acct-chips{display:flex;flex-wrap:wrap;gap:6px}
.acct-chip{width:auto;margin:0;padding:8px 12px;border:1px solid var(--color-border2);border-radius:999px;background:var(--color-card);font-size:13px;color:var(--color-text);font-weight:500;cursor:pointer;line-height:1.2}
.acct-chip:hover{background:var(--color-bg-secondary)}
.acct-chip:active{opacity:0.7}
.acct-chip:disabled{opacity:0.4;cursor:not-allowed}

.bankside-wrap{margin-top:10px}
.bankside-chips{display:flex;gap:8px}
.bankside-chip{flex:1;margin:0;padding:10px;border:1.5px solid var(--color-border2);border-radius:10px;background:var(--color-card);font-size:14px;font-weight:600;color:var(--color-text);cursor:pointer}
.bankside-chip.sel{border-color:var(--color-info);background:#EAF3FB;box-shadow:0 0 0 3px rgba(24,95,165,0.12)}
.bankside-chip.ok{border-color:#7FB04A;background:#F2F8EA}
.bankside-chip.ng{border-color:#D98A8A;background:#FCF0F0}

.acct-actions{display:flex;gap:8px;margin-top:10px}
.acct-actions button{flex:1;margin:0;background:var(--color-bg-secondary);color:var(--color-text);font-size:13px;padding:10px;font-weight:500;border:0.5px solid var(--color-border2)}

.result-ok{background:#EAF3DE;border:0.5px solid #C5DDA0;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#3B6D11}
.result-ng{background:#FCEBEB;border:0.5px solid #F0C5C5;border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;font-size:14px;color:#A32D2D}
.explain{background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;color:var(--color-text2);margin-bottom:8px;line-height:1.8}
.explain .ans-line{font-weight:600;color:var(--color-text);margin-bottom:6px;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <h1>現金預金ドリル</h1>
  <div class="nav"><a href="index.html">減価償却</a><a href="pension.html">退職給付</a><a href="purchases.html">仕入</a><a href="lease.html">リース</a><a href="lease2.html">リース２</a><a href="wip.html">仕掛品</a><a href="hedge.html">為替予約</a><a href="hedge2.html">為替予約２</a><a href="cash.html" class="nav-on">現金預金</a></div>
  <div class="stat-grid">
    <div class="stat"><span class="n" id="s-total">0</span><span class="l">問</span></div>
    <div class="stat"><span class="n" id="s-correct">0</span><span class="l">正解</span></div>
  </div>

  <div class="card">
    <div id="cat-wrap"></div>
    <div class="label">問題</div>
    <div id="q-body" class="q-text" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="label">仕訳（科目を借方→貸方の順にタップ）</div>
    <div class="je-slots">
      <div class="je-slot" id="slot-dr">
        <div class="je-slot-label">借方</div>
        <div class="je-slot-val empty" id="dr-val">—</div>
      </div>
      <div class="je-slot" id="slot-cr">
        <div class="je-slot-label">貸方</div>
        <div class="je-slot-val empty" id="cr-val">—</div>
      </div>
    </div>
    <div class="bankside-wrap" id="bankside-wrap" style="display:none">
      <div class="acct-label">銀行勘定調整（銀行残高への影響）</div>
      <div class="bankside-chips">
        <button type="button" class="bankside-chip" id="bs-plus" onclick="pickBankSide('plus')">銀行側 ＋</button>
        <button type="button" class="bankside-chip" id="bs-minus" onclick="pickBankSide('minus')">銀行側 −</button>
      </div>
    </div>
    <div class="je-status" id="je-status">借方の科目を選んでください</div>
    <div class="acct-label">科目</div>
    <div class="acct-chips" id="acct-chips"></div>
    <div class="acct-actions">
      <button onclick="setNoEntry()">仕訳なし</button>
      <button onclick="clearSelection()">クリア</button>
    </div>
    <div class="hint">「営業費」には通信費・水道光熱費・販売管理費等を含みます。</div>
  </div>

  <div id="result-area"></div>
  <button id="btn-check" onclick="grade()">答え合わせ</button>
  <button id="btn-next" style="display:none" onclick="nextQ()">次の問題 →</button>
</div>

<script>
// === 科目リスト（チップとして表示） ===
const ACCOUNTS = [
  '現金','当座預金',
  '売掛金','受取手形','不渡手形',
  '買掛金','支払手形','未払金',
  '受取配当金','有価証券利息','雑収入',
  '営業費','支払リース料','退職給付費用','雑損失',
  '為替差損益','支店'
];

// === 論点（カテゴリ・言い回し・仕訳） ===
const CONCEPTS = [
  // ----- 現金実査 -----
  {id:'dividend',cat:'現金実査',dr:'現金',cr:'受取配当金',
    wordings:[
      '決算日に金庫を実査したところ、Ａ社株式に係る配当金領収書が保管されていた。なお、未処理である。',
      '期末に金庫の中を実査したところ、Ｍ社株式について受け取った配当金領収証が保管されていたが、未処理であった。',
      '金庫を実地調査したところ、当期中に受け取ったＶ社株式に関する配当金領収書が保管されていた。'
    ],
    explain:'配当金領収書は通貨代用証券として現金扱い。未処理なので、現金の増加と受取配当金（収益）を計上する。'},
  {id:'coupon',cat:'現金実査',dr:'現金',cr:'有価証券利息',
    wordings:[
      '決算日に金庫の中を実査したところ、Ｌ社社債のクーポン利息（利払日：当期末）が保管されていたが、未処理であった。',
      '期末に金庫の中を確認したところ、Ｇ社社債のクーポン利息（当期末に利払日が到来したもの）が保管されていたが、未処理であった。',
      '金庫を実査したところ、Ｘ社債券のクーポン利息（当期末利払日）について未記帳のものが保管されていた。'
    ],
    explain:'クーポン利息（社債の利札）も通貨代用証券として現金扱い。利息受取の処理が未済なので、現金と有価証券利息を計上する。'},
  {id:'other_check_unproc',cat:'現金実査',dr:'現金',cr:'売掛金',
    wordings:[
      '金庫を実査したところ、他人振出小切手が保管されていた。売掛金の回収として受け取ったものであるが、未処理であった。',
      '期末日に金庫の中を実査したところ、甲社振出小切手が発見された。売掛金回収時の処理が未済であった。'

    explain:'他人（他社）振出小切手は通貨代用証券として現金扱い。売掛金回収の処理が未済なので、現金の増加と売掛金の取消を計上する。'},
  {id:'other_check_misposted',cat:'現金実査',dr:'現金',cr:'当座預金',
    wordings:[
      '金庫の中にＡ社振出小切手が保管されていた。売掛金の回収として受け取ったものであるが、当座預金に入金したものとして処理している。'
    ],
    explain:'他人振出小切手は本来「現金」だが、誤って当座預金に入金として処理している。当座預金を取り消し、現金に振り替える。'},
  {id:'postdated',cat:'現金実査',dr:'受取手形',cr:'現金',
    wordings:[
      '現金出納帳に、Ｂ社振り出しの小切手（振出日が翌期となるもの）が入金として記帳されていた。',
      '金庫の中に他社振出小切手が保管されていた。受取時に現金勘定で処理していたが、振出日が翌期であった。'
    ],
    explain:'振出日が翌期となる先日付小切手は実質的に受取手形と同じ。現金から受取手形に振り替える。'},
  {id:'fx_gain',cat:'現金実査',dr:'現金',cr:'為替差損益',
    wordings:[
      '金庫の中に外貨建ての通貨が保管されていた。受取日の直物為替レートで記帳されているが、決算日の直物為替レートは受取日より円安となっている。'
    ],
    explain:'外貨建ての現金は決算日レートで換算替えする。円安なので円換算額が増加 → 現金の増加・為替差益（為替差損益）を計上。'},
  {id:'fx_loss',cat:'現金実査',dr:'為替差損益',cr:'現金',
    wordings:[
      '金庫の中に外貨建ての通貨が保管されていた。帳簿価額は受取日のレートで記帳されているが、決算日の直物為替レートは受取日より円高となっている。'
    ],
    explain:'外貨建ての現金は決算日レートで換算替えする。円高なので円換算額が減少 → 現金の減少・為替差損（為替差損益）を計上。'},
  {id:'cash_loss',cat:'現金実査',dr:'雑損失',cr:'現金',
    wordings:[
      '決算日に現金の実査を行ったところ、実際有高が帳簿残高を下回っていた。原因不明であるため、差額を雑損失とする。'

    explain:'現金の実際有高が帳簿残高より少ない（不足）。原因不明分は雑損失に振り替える。'},
  {id:'cash_gain',cat:'現金実査',dr:'現金',cr:'雑収入',
    wordings:[
      '決算日に現金の実査を行ったところ、実際有高が帳簿残高を上回っていた。原因不明であるため、差額を雑収入とする。'

    explain:'現金の実際有高が帳簿残高より多い（過剰）。原因不明分は雑収入に振り替える。'},

  // ----- 銀行勘定調整 -----
  {id:'after_hours',cat:'銀行勘定調整',noEntry:true,bankSide:'plus',
    wordings:[
      '決算日に現金を当座預金に預け入れたが、銀行の営業時間終了後であったため、銀行では翌日の入金として処理されていた。当社では預入日に適正に記帳している。',

    ],
    explain:'時間外預入は銀行側が翌日処理したことによるズレであり、当社の処理は適正。当社側の修正仕訳は不要（銀行残高の加算項目）。'},
  {id:'unpresented',cat:'銀行勘定調整',noEntry:true,bankSide:'minus',
    wordings:[
      '買掛金の支払いのために振り出した小切手が、銀行に未呈示であった。',
      '買掛金の支払いとして振り出した小切手が決済されていなかった。',
      '営業費の支払いのために振り出した小切手について記帳済みであったが、未取付となっていた。'
    ],
    explain:'未取付小切手は相手先が銀行に呈示していないだけで、当社の処理は適正。当社側の修正仕訳は不要（銀行残高の減算項目）。'},
  {id:'deposit_staff_error',cat:'銀行勘定調整',dr:'現金',cr:'当座預金',
    wordings:[
      '期末日に現金を当座預金口座へ預け入れる予定であったが、当社の経理担当者の手違いで実際には預け入れておらず、現金は手許に残っていた。なお、当社では当座預金口座に預け入れたものとして処理している。',
      '当社の担当者の誤りにより、実際には当座預金へ預け入れていない現金を、預け入れたものとして記帳していた（現金は手許にある）。'
    ],
    explain:'当社は預入の仕訳を計上済みだが、実際には預け入れておらず現金は手許にある（当社側の誤り）。誤って計上した当座預金の増加を取り消し、現金に戻す。'},
  {id:'undelivered_buy',cat:'銀行勘定調整',dr:'当座預金',cr:'買掛金',
    wordings:[
      '買掛金の支払いとして振り出した小切手が、相手先に交付されておらず、当社の金庫に保管されていた。',

    ],
    explain:'未渡小切手（買掛金支払用）は、まだ相手に渡していないため当座預金が実質的に減少していない。当座預金を戻し、買掛金も復活させる。'},

    explain:'未渡小切手（営業費支払用）は、費用は既に発生しているため取り消せない。当座預金を戻し、貸方は未払金とする。'},
  {id:'draw_op',cat:'銀行勘定調整',dr:'営業費',cr:'当座預金',

      '当座勘定照合表に電話代の引落しがあったが、当社では未記帳である。',

    ],
    explain:'銀行側で営業費（通信費・水道光熱費等を含む）が引き落とされたのに当社が未記帳。費用計上と当座預金の減少を計上する。'},
  {id:'draw_lease',cat:'銀行勘定調整',dr:'支払リース料',cr:'当座預金',

  {id:'receivable_in',cat:'銀行勘定調整',dr:'当座預金',cr:'売掛金',

      '得意先から売掛金の回収として当座預金に振り込みがあったが、当社では未処理であった。',

    ],

  {id:'note_payment',cat:'銀行勘定調整',dr:'支払手形',cr:'当座預金',
    wordings:[
      '決算日に手形代金が当座預金から引き落とされていたが、当社では何ら処理を行っていなかった。',
      '支払手形代金が当座預金から引き落とされていたが、この通知が当社に未達であった。'

  {id:'note_dishonor',cat:'銀行勘定調整',dr:'不渡手形',cr:'当座預金',

      '取立依頼していた得意先振出約束手形について入金記帳済であったが、不渡りとなり入金されていなかった。'
    ],
    explain:'取立依頼の手形が不渡りとなった場合、入金記帳の取消＋不渡手形への振替を行う。当座預金を減らし、不渡手形を計上する。'},
  {id:'note_uncollected',cat:'銀行勘定調整',dr:'受取手形',cr:'当座預金',
    wordings:[
      '得意先振出の約束手形を銀行に取立依頼した際に当座預金の増加として記帳していたが、決算日現在、銀行はまだ取り立てていなかった（不渡りではない）。',
      '取立依頼した約束手形を取立時に当座預金の入金として記帳していたが、決算日時点で銀行は取立てを完了していなかった。'
    ],
    explain:'手形は取立てが完了して初めて当座預金となる。取立依頼の時点で当座預金として記帳したのは誤り。決算日現在は未取立なので、誤って計上した当座預金の増加を取り消し、受取手形に戻す。'},
  {id:'note_uncollected_check',cat:'銀行勘定調整',noEntry:true,bankSide:'plus',
    wordings:[
      '得意先から受け取った他人振出小切手を銀行に預け入れ、当座預金の増加として記帳していたが、決算日現在、銀行ではまだ取り立てられていなかった。',
      '銀行に預け入れた他店振出小切手について、決算日時点で銀行が取立てを完了していなかった。当社は預入時に適正に記帳している。'
    ],
    explain:'小切手の預入れを当座預金として記帳するのは適正。銀行がまだ取り立てていないだけなので、当社側の修正仕訳は不要（銀行残高の加算項目）。手形の取立未済（当座預金の取消が必要）とは異なる。'},
  {id:'branch_in',cat:'銀行勘定調整',dr:'当座預金',cr:'支店',
    wordings:[
      '本店の当座預金に支店からの振込みがあったが、未記帳であった。'
    ],
    explain:'本店当座預金に支店から送金が振り込まれたが未記帳。当座預金の増加と相手勘定として「支店」を計上する。'}
];

// === 状態 ===
const STATE = {total:0,correct:0,q:null,history:[],graded:false};
const SEL = {dr:null,cr:null,next:'dr',bankSide:null};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

const catCls={'現金実査':'cat-genkin','銀行勘定調整':'cat-touza','小口現金':'cat-kogu'};

// === ボタン表示の略称（値・採点は正式名のまま） ===
const ABBREV={'現金':'げ','当座預金':'と','売掛金':'うK','買掛金':'KK','営業費':'え','有価証券利息':'R','受取手形':'う手','支払手形':'し手','不渡手形':'不手','受取配当金':'うは','未払金':'未払','雑収入':'ざし','雑損失':'ざそ'};

function renderChips(){
  const html=ACCOUNTS.map(a=>`<button type="button" class="acct-chip" data-acct="${a}" onclick="pickAcct('${a}')">${ABBREV[a]||a}</button>`).join('');
  document.getElementById('acct-chips').innerHTML=html;
}

function pickAcct(acct){
  if(STATE.graded)return;
  if(SEL.next==='dr'){
    SEL.dr=acct;SEL.next='cr';
  }else if(SEL.next==='cr'){
    SEL.cr=acct;SEL.next=null;
  }else{
    // 両方埋まっている → 貸方を上書きする運用
    SEL.cr=acct;
  }
  updateSlots();
}

function pickBankSide(side){
  if(STATE.graded)return;
  SEL.bankSide=side;
  updateSlots();
}

function updateSlots(){
  const drVal=document.getElementById('dr-val');
  const crVal=document.getElementById('cr-val');
  const drSlot=document.getElementById('slot-dr');
  const crSlot=document.getElementById('slot-cr');
  const status=document.getElementById('je-status');

  const disp=v=>v?(ABBREV[v]||v):'—';
  drVal.textContent=disp(SEL.dr);
  drVal.classList.toggle('empty',!SEL.dr);
  crVal.textContent=disp(SEL.cr);
  crVal.classList.toggle('empty',!SEL.cr);

  for(const el of[drSlot,crSlot])el.classList.remove('active','filled','ok','ng');
  if(!STATE.graded){
    if(SEL.next==='dr')drSlot.classList.add('active');
    else if(SEL.next==='cr')crSlot.classList.add('active');
    if(SEL.dr)drSlot.classList.add('filled');
    if(SEL.cr)crSlot.classList.add('filled');
  }

  // 銀行側＋／− セレクタ（仕訳なしのときだけ表示）
  const bw=document.getElementById('bankside-wrap');
  const showBank=(SEL.dr==='仕訳なし');
  bw.style.display=showBank?'block':'none';
  const bp=document.getElementById('bs-plus'),bm=document.getElementById('bs-minus');
  for(const el of[bp,bm])el.classList.remove('sel','ok','ng');
  if(showBank&&!STATE.graded){
    if(SEL.bankSide==='plus')bp.classList.add('sel');
    if(SEL.bankSide==='minus')bm.classList.add('sel');
  }

  status.classList.remove('done','warn');
  if(STATE.graded){
    status.textContent='';
  }else if(showBank){
    if(SEL.bankSide===null){status.textContent='銀行側 ＋ / − を選んでください';}
    else{status.textContent='答え合わせを押してください';status.classList.add('done');}
  }else if(SEL.next==='dr'){
    status.textContent='借方の科目を選んでください';
  }else if(SEL.next==='cr'){
    status.textContent='貸方の科目を選んでください';
  }else{
    status.textContent='答え合わせを押してください';
    status.classList.add('done');
  }
}

function clearSelection(){
  if(STATE.graded)return;
  SEL.dr=null;SEL.cr=null;SEL.next='dr';SEL.bankSide=null;
  updateSlots();
}

function setNoEntry(){
  if(STATE.graded)return;
  SEL.dr='仕訳なし';SEL.cr='仕訳なし';SEL.next=null;SEL.bankSide=null;
  updateSlots();
}

function setChipsDisabled(disabled){
  for(const el of document.querySelectorAll('.acct-chip')){
    el.disabled=disabled;
  }
}

function newQ(){
  // 直近5問は避ける
  const recent=STATE.history.slice(-5);
  const pool=CONCEPTS.filter(c=>!recent.includes(c.id));
  const c=pick(pool.length?pool:CONCEPTS);
  const wording=pick(c.wordings);
  STATE.q={concept:c,wording};
  STATE.history.push(c.id);
  STATE.graded=false;
  SEL.dr=null;SEL.cr=null;SEL.next='dr';SEL.bankSide=null;

  const qNum=CONCEPTS.indexOf(c)+1;
  document.getElementById('cat-wrap').innerHTML=`<span class="q-num">${qNum} / ${CONCEPTS.length}</span><span class="cat-badge ${catCls[c.cat]||''}">${c.cat}</span>`;
  document.getElementById('q-body').textContent=wording;
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
  setChipsDisabled(false);
  updateSlots();
}

function grade(){
  if(STATE.graded)return;
  const c=STATE.q.concept;
  if(SEL.dr===null||SEL.cr===null){
    const status=document.getElementById('je-status');
    status.textContent='借方と貸方を両方選んでから答え合わせしてください';
    status.classList.remove('done');status.classList.add('warn');
    return;
  }
  if(SEL.dr==='仕訳なし'&&SEL.bankSide===null){
    const status=document.getElementById('je-status');
    status.textContent='銀行側 ＋ / − を選んでください';
    status.classList.remove('done');status.classList.add('warn');
    return;
  }

  const sideLabel=s=>s==='plus'?'銀行側＋':'銀行側−';
  let drOk,crOk,allOk,ansText,bankOk=true;
  if(c.noEntry){
    drOk=(SEL.dr==='仕訳なし');
    crOk=(SEL.cr==='仕訳なし');
    bankOk=(SEL.bankSide===c.bankSide);
    allOk=drOk&&crOk&&bankOk;
    ansText=`仕訳なし（${sideLabel(c.bankSide)}）`;
  }else{
    drOk=(SEL.dr===c.dr);
    crOk=(SEL.cr===c.cr);
    allOk=drOk&&crOk;
    ansText=`(借) ${c.dr} ／ (貸) ${c.cr}`;
  }

  STATE.graded=true;
  STATE.total++;
  if(allOk)STATE.correct++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-correct').textContent=STATE.correct;

  // スロットの結果表示
  const drSlot=document.getElementById('slot-dr');
  const crSlot=document.getElementById('slot-cr');
  for(const el of[drSlot,crSlot])el.classList.remove('active','filled');
  drSlot.classList.add(drOk?'ok':'ng');
  crSlot.classList.add(crOk?'ok':'ng');
  document.getElementById('je-status').textContent='';

  // 銀行側＋／− の結果表示（仕訳なしのとき）
  if(c.noEntry){
    const bp=document.getElementById('bs-plus'),bm=document.getElementById('bs-minus');
    for(const el of[bp,bm])el.classList.remove('sel','ok','ng');
    const chosen=SEL.bankSide==='plus'?bp:(SEL.bankSide==='minus'?bm:null);
    const correctChip=c.bankSide==='plus'?bp:bm;
    if(chosen)chosen.classList.add(bankOk?'ok':'ng');
    if(!bankOk)correctChip.classList.add('ok');
  }

  setChipsDisabled(true);
  document.getElementById('result-area').innerHTML=`
    <div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 正解！':'✗ 不正解'}</div>
    <div class="explain"><div class="ans-line">正解：${ansText}</div>${c.explain}</div>
  `;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}

// セルフテスト
(function selfTest(){
  // ACCOUNTSにCONCEPTSのdr/crが含まれているか確認
  for(const c of CONCEPTS){
    if(c.noEntry)continue;
    console.assert(ACCOUNTS.includes(c.dr),`ACCOUNTS missing dr: ${c.dr} (${c.id})`);
    console.assert(ACCOUNTS.includes(c.cr),`ACCOUNTS missing cr: ${c.cr} (${c.id})`);
  }
})();

renderChips();
newQ();

// PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
