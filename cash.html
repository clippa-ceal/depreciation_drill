function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function normalize(s){
  if(s==null)return'';
  let v=String(s).trim();
  // 全角英数→半角
  v=v.replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  // 空白・記号除去
  v=v.replace(/[\s　・,，()（）「」"'`]/g,'');
  // 末尾「勘定」除去
  v=v.replace(/勘定$/,'');
  // 「等」除去（販管費等→販管費）
  v=v.replace(/等$/,'');
  return v;
}

function canonicalize(input){
  const s=normalize(input);
  if(s==='')return'';
  for(const[canon,syns]of Object.entries(SYN)){
    for(const w of syns){
      if(normalize(w)===s)return canon;
    }
  }
  return s;
}

function isNoEntryInput(s){
  const n=normalize(s);
  return n===''||n==='なし'||n==='仕訳なし'||n==='処理なし'||n==='-'||n==='ー';
}

const catCls={'現金実査':'cat-genkin','銀行勘定調整':'cat-touza','小口現金':'cat-kogu'};

function pickConceptNoRepeat(){
  // 直近5問は避ける
  const recent=STATE.history.slice(-5);
  const pool=CONCEPTS.filter(c=>!recent.includes(c.id));
  const arr=pool.length?pool:CONCEPTS;
  return pick(arr);
}

function newQ(){
  const c=pickConceptNoRepeat();
  const wording=pick(c.wordings);
  STATE.q={concept:c,wording};
  STATE.history.push(c.id);
  STATE.graded=false;
  document.getElementById('cat-wrap').innerHTML=`<span class="cat-badge ${catCls[c.cat]||''}">${c.cat}</span>`;
  document.getElementById('q-body').textContent=wording;
  for(const id of['dr','cr']){
    const el=document.getElementById(id);
    el.value='';el.disabled=false;el.classList.remove('cell-ok','cell-ng');
  }
  document.getElementById('result-area').innerHTML='';
  document.getElementById('btn-check').style.display='block';
  document.getElementById('btn-next').style.display='none';
}

function markNoEntry(){
  if(STATE.graded)return;
  document.getElementById('dr').value='仕訳なし';
  document.getElementById('cr').value='仕訳なし';
}

function mark(id,ok){
  const el=document.getElementById(id);
  el.classList.remove('cell-ok','cell-ng');
  el.classList.add(ok?'cell-ok':'cell-ng');
}

function grade(){
  if(STATE.graded)return;
  const c=STATE.q.concept;
  const drIn=document.getElementById('dr').value;
  const crIn=document.getElementById('cr').value;
  let drOk,crOk,allOk,ansText;

  if(c.noEntry){
    drOk=isNoEntryInput(drIn);
    crOk=isNoEntryInput(crIn);
    allOk=drOk&&crOk;
    ansText='仕訳なし';
  }else{
    drOk=canonicalize(drIn)===c.dr;
    crOk=canonicalize(crIn)===c.cr;
    allOk=drOk&&crOk;
    ansText=`(借) ${c.dr} ／ (貸) ${c.cr}`;
  }
  mark('dr',drOk);mark('cr',crOk);

  STATE.graded=true;
  STATE.total++;
  if(allOk)STATE.correct++;
  document.getElementById('s-total').textContent=STATE.total;
  document.getElementById('s-correct').textContent=STATE.correct;

  document.getElementById('result-area').innerHTML=`
    <div class="${allOk?'result-ok':'result-ng'}">${allOk?'✓ 正解！':'✗ 不正解'}</div>
    <div class="explain"><div class="ans-line">正解：${ansText}</div>${c.explain}</div>
  `;
  document.getElementById('dr').disabled=true;
  document.getElementById('cr').disabled=true;
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
}

function nextQ(){newQ();}

// Enterで答え合わせ
for(const id of['dr','cr']){
  document.getElementById(id).addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();if(!STATE.graded)grade();else nextQ();}
  });
}
